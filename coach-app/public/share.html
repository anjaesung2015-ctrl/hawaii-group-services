<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>훈련 프로그램</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;padding:14px;max-width:520px;margin:0 auto}
.card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:10px}
.sub{font-size:11px;color:#64748b}
.exercise{padding:8px;background:rgba(15,23,42,.5);border-radius:6px;margin-bottom:4px;display:flex;gap:8px;align-items:start}
.exercise.done{opacity:.5}
.exercise.done .name{text-decoration:line-through}
input[type=checkbox]{width:18px;height:18px;flex-shrink:0;margin-top:2px}
.name{font-size:12px;font-weight:600}
.meta{font-size:10px;color:#94a3b8;margin-top:2px}
</style>
</head>
<body>
<div id="root">로딩...</div>
<script>
var token=location.pathname.split('/').pop();
var BASE='/coach/api/share/'+token;

function load(){
  fetch(BASE+'/programs').then(function(r){return r.json()}).then(function(d){
    if(d.error){document.getElementById('root').innerHTML='<div class="card" style="background:rgba(239,68,68,.1);color:#fca5a5">유효하지 않은 링크입니다</div>';return}
    var h='<div style="text-align:center;margin-bottom:16px">';
    h+='<div style="font-size:24px;margin-bottom:4px">🎾</div>';
    h+='<div style="font-size:18px;font-weight:800">'+esc(d.athlete.name)+'</div>';
    if(d.athlete.level)h+='<div class="sub">'+esc(d.athlete.level)+'</div>';
    h+='</div>';
    if(!d.programs||!d.programs.length){h+='<div class="card">아직 등록된 프로그램이 없습니다.</div>';document.getElementById("root").innerHTML=h;return}
    d.programs.forEach(function(p){
      h+='<div class="card">';
      h+='<div style="font-size:13px;font-weight:700;color:#22c55e">'+esc(p.program_date)+'</div>';
      if(p.title)h+='<div style="font-size:14px;font-weight:600;margin-top:2px">'+esc(p.title)+'</div>';
      if(p.coach_note)h+='<div class="sub" style="margin-top:4px;font-style:italic">📝 '+esc(p.coach_note)+'</div>';
      h+='<div style="margin-top:10px">';
      (p.exercises||[]).forEach(function(e){
        h+='<div class="exercise '+(e.done?'done':'')+'">';
        h+='<input type="checkbox" '+(e.done?'checked':'')+' data-eid="'+e.id+'">';
        h+='<div style="flex:1"><div class="name">['+esc(e.category)+'] '+esc(e.name)+'</div>';
        var meta=[];
        if(e.sets)meta.push(e.sets+'set');if(e.reps)meta.push(e.reps+'rep');if(e.duration_min)meta.push(e.duration_min+'분');
        if(meta.length)h+='<div class="meta">'+meta.join(' · ')+'</div>';
        if(e.notes)h+='<div class="meta" style="font-style:italic">'+esc(e.notes)+'</div>';
        h+='</div></div>';
      });
      h+='</div></div>';
    });
    document.getElementById('root').innerHTML=h;
    document.getElementById('root').onchange=function(e){
      if(e.target.getAttribute('data-eid')){
        var eid=e.target.getAttribute('data-eid');
        fetch(BASE+'/exercises/'+eid+'/done',{method:'POST'}).then(function(r){return r.json()}).then(function(){load()});
      }
    };
  });
}
function esc(s){return(s||'').toString().replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
load();
</script>
</body>
</html>
