<!DOCTYPE html><html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🌏 투어링팀 관리</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f59e0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--card:#141428;--card2:#1e1e3a;--primary:#f59e0b;--success:#22c55e;--danger:#ef4444;--info:#3b82f6;--warning:#f59e0b;--text:#f0f0f0;--text2:#8888aa;--accent:#a855f7}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-box{background:var(--card);padding:2rem;border-radius:16px;width:100%;max-width:360px;text-align:center}
.login-box h1{font-size:2rem;margin-bottom:0.5rem}
.login-box input{width:100%;padding:0.8rem;margin:0.4rem 0;border-radius:10px;border:1px solid var(--card2);background:var(--bg);color:var(--text);font-size:1rem}
.app-wrap{display:none}
.header{background:linear-gradient(135deg,#1a1a3e,#2a1a4a);padding:1rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header h1{font-size:1.1rem;display:flex;align-items:center;gap:0.5rem}
.nav{display:flex;overflow-x:auto;background:var(--card);border-bottom:1px solid rgba(255,255,255,0.05);padding:0 0.5rem}
.nav-item{padding:0.7rem 0.8rem;font-size:0.8rem;white-space:nowrap;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.2s}
.nav-item.active{color:var(--primary);border-color:var(--primary)}
.content{padding:1rem;max-width:900px;margin:0 auto}
.section{display:none}.section.active{display:block}
.card{background:var(--card);border-radius:12px;padding:1rem;margin-bottom:0.8rem}
.btn{border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;font-size:0.85rem;color:white;display:inline-flex;align-items:center;gap:0.3rem;transition:opacity 0.2s}
.btn:hover{opacity:0.85}
.btn-primary{background:var(--primary);color:#000}
.btn-success{background:var(--success)}
.btn-danger{background:var(--danger)}
.btn-info{background:var(--info)}
.btn-sm{padding:0.3rem 0.6rem;font-size:0.75rem}
.badge{display:inline-block;padding:0.15rem 0.5rem;border-radius:20px;font-size:0.7rem;font-weight:600}
.form-group{margin-bottom:0.6rem}
.form-group label{display:block;font-size:0.8rem;color:var(--text2);margin-bottom:0.2rem}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:0.5rem;border-radius:8px;border:1px solid var(--card2);background:var(--bg);color:var(--text);font-size:0.9rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem}
.page-header h2{font-size:1.2rem}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:0.6rem;margin-bottom:1rem}
.stat-card{background:var(--card);border-radius:12px;padding:0.8rem;text-align:center}
.stat-card .num{font-size:1.8rem;font-weight:700}
.stat-card .label{font-size:0.75rem;color:var(--text2)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--card);border-radius:16px;padding:1.5rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.player-card{display:flex;gap:0.8rem;align-items:flex-start}
.player-avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.win{color:var(--success)}.loss{color:var(--danger)}.grade-badge{font-size:0.7rem;padding:0.1rem 0.4rem;border-radius:4px;font-weight:700}
.tab-bar{display:flex;gap:0.3rem;margin-bottom:0.8rem;flex-wrap:wrap}
.tab-btn{padding:0.4rem 0.8rem;border-radius:8px;background:var(--card2);border:none;color:var(--text2);cursor:pointer;font-size:0.8rem}
.tab-btn.active{background:var(--primary);color:#000}
#login-error{color:var(--danger);font-size:0.85rem;margin-top:0.5rem;display:none}
#modal-container{position:fixed;z-index:200}
@media(max-width:600px){.form-row,.form-row3{grid-template-columns:1fr}.stat-grid{grid-template-columns:repeat(2,1fr)}}
</style></head><body>

<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div style="font-size:3rem;margin-bottom:0.5rem">🌏🎾</div>
    <h1>투어링팀 관리</h1>
    <p style="color:var(--text2);margin-bottom:1.5rem;font-size:0.85rem">Hawaii Tennis Touring Team</p>
    <input id="login-user" placeholder="아이디" autofocus>
    <input id="login-pass" placeholder="비밀번호" type="password">
    <button class="btn btn-primary" style="width:100%;padding:0.8rem;margin-top:0.5rem;font-size:1rem" onclick="doLogin()">로그인</button>
    <div id="login-error"></div>
  </div>
</div>

<div class="app-wrap" id="app-wrap">
  <div class="header">
    <h1>🌏 투어링팀</h1>
    <div style="display:flex;align-items:center;gap:0.5rem">
      <span id="user-name" style="font-size:0.8rem;color:var(--text2)"></span>
      <button class="btn btn-sm" style="background:var(--card2)" onclick="logout()">로그아웃</button>
    </div>
  </div>
  <div class="nav" id="nav">
    <a href="/center/portal" class="nav-item" style="background:rgba(59,130,246,0.1);margin-bottom:6px;text-decoration:none;color:var(--text2)"><i class="fas fa-th-large"></i> ← 포털</a>
    <div class="nav-item active" onclick="showSection('dashboard')"><i class="fas fa-home"></i> 대시보드</div>
    <div class="nav-item" onclick="showSection('players')"><i class="fas fa-users"></i> 선수</div>
    <div class="nav-item" onclick="showSection('tournaments')"><i class="fas fa-trophy"></i> 대회</div>
    <div class="nav-item" onclick="showSection('matches')"><i class="fas fa-table-tennis-paddle-ball"></i> 경기</div>
    <div class="nav-item" onclick="showSection('sheets')"><i class="fas fa-clipboard-check"></i> 체크지</div>
    <div class="nav-item" onclick="showSection('expeditions')"><i class="fas fa-plane"></i> 원정</div>
    <div class="nav-item" onclick="showSection('logs')"><i class="fas fa-clipboard"></i> 훈련 기록</div>
  </div>
  <div class="content">
    <div class="section active" id="sec-dashboard"></div>
    <div class="section" id="sec-players"></div>
    <div class="section" id="sec-tournaments"></div>
    <div class="section" id="sec-matches"></div>
    <div class="section" id="sec-sheets"></div>
    <div class="section" id="sec-expeditions"></div>
    <div class="section" id="sec-logs"></div>
  </div>
</div>
<div id="modal-container"></div>

<script>
const _p=window.location.pathname.replace(/\/+$/,'');const API=_p==='/'||_p===''?'':_p;
let authToken='',currentUser=null,players=[],tournaments=[];

function todayUB(){const d=new Date(Date.now()+8*3600000);return d.toISOString().split('T')[0]}
function g(id){return document.getElementById(id)?.value||''}
function formatMoney(n){return n?'₩'+Number(n).toLocaleString():'₩0'}
function closeModal(){document.getElementById('modal-container').innerHTML=''}

async function apiFetch(url,opts={}){
  opts.headers={...opts.headers,'Content-Type':'application/json'};
  return fetch(API+url,opts);
}

// Auth
async function doLogin(){
  try{
    const res=await apiFetch('/api/login',{method:'POST',body:JSON.stringify({username:g('login-user'),password:g('login-pass')})});
    const d=await res.json();
    if(!res.ok){document.getElementById('login-error').textContent=d.error;document.getElementById('login-error').style.display='block';return}
    authToken=d.token;currentUser=d.user;
    localStorage.setItem('touring_token',d.token);localStorage.setItem('touring_user',JSON.stringify(d.user));
    showApp();
  }catch(e){document.getElementById('login-error').textContent='연결 오류';document.getElementById('login-error').style.display='block'}
}

function showApp(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app-wrap').style.display='block';
  document.getElementById('user-name').textContent=currentUser?.name||'';
  loadDashboard();
}

function logout(){localStorage.removeItem('touring_token');localStorage.removeItem('touring_user');location.reload()}

// Init
(function(){
  const t=localStorage.getItem('touring_token');const u=localStorage.getItem('touring_user');
  if(t&&u){authToken=t;currentUser=JSON.parse(u);showApp()}
  document.getElementById('login-pass')?.addEventListener('keypress',e=>{if(e.key==='Enter')doLogin()});
})();

// Nav
let _curSec='dashboard';
function showSection(n,noPush){
  if(!noPush&&n!==_curSec)history.pushState({sec:n},'','#'+n);_curSec=n;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+n)?.classList.add('active');
  const idx=['dashboard','players','tournaments','matches','sheets','expeditions','logs'].indexOf(n);
  document.querySelectorAll('.nav-item:not(a)')[idx]?.classList.add('active');
  if(n==='dashboard')loadDashboard();
  else if(n==='players')loadPlayers();
  else if(n==='tournaments')loadTournaments();
  else if(n==='matches')loadMatches();
  else if(n==='sheets')loadSheets();
  else if(n==='expeditions')loadExpeditions();
  else if(n==='logs')loadLogs();
}

// Dashboard
async function loadDashboard(){
  const [dash,ps,ts]=await Promise.all([
    apiFetch('/api/dashboard').then(r=>r.json()),
    apiFetch('/api/players').then(r=>r.json()),
    apiFetch('/api/tournaments').then(r=>r.json())
  ]);
  players=ps;tournaments=ts;
  const wr=dash.winRate;const winPct=wr.total>0?Math.round(wr.wins/wr.total*100):0;
  document.getElementById('sec-dashboard').innerHTML=`
    <h2 style="margin-bottom:1rem">🌏 Hawaii Tennis Touring Team</h2>
    <div class="stat-grid">
      <div class="stat-card"><div class="num" style="color:var(--primary)">${dash.players}</div><div class="label">활동 선수</div></div>
      <div class="stat-card"><div class="num" style="color:var(--info)">${dash.upcoming?.length||0}</div><div class="label">예정 대회</div></div>
      <div class="stat-card"><div class="num" style="color:var(--success)">${winPct}%</div><div class="label">승률</div></div>
      <div class="stat-card"><div class="num" style="color:var(--accent)">${wr.total}</div><div class="label">총 경기</div></div>
    </div>
    ${dash.activeExpedition?`<div class="card" style="border-left:4px solid var(--warning)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><strong>✈️ ${dash.activeExpedition.name}</strong><div style="font-size:0.82rem;color:var(--text2)">${dash.activeExpedition.destination} | ${dash.activeExpedition.start_date}~${dash.activeExpedition.end_date}</div></div>
        <span class="badge" style="background:var(--warning);color:#000">${dash.activeExpedition.status}</span>
      </div>
    </div>`:''}
    ${dash.upcoming?.length?`<div class="card"><h3 style="margin-bottom:0.5rem;font-size:1rem">🏆 다가오는 대회</h3>
      ${dash.upcoming.map(t=>`<div style="display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.85rem">
        <div><strong>${t.name}</strong> <span class="grade-badge" style="background:${gradeColor(t.grade)}">${t.grade||''}</span></div>
        <div style="color:var(--text2)">${t.location} | ${t.start_date}</div>
      </div>`).join('')}</div>`:''}
    ${dash.recentMatches?.length?`<div class="card"><h3 style="margin-bottom:0.5rem;font-size:1rem">🎾 최근 경기</h3>
      ${dash.recentMatches.slice(0,5).map(m=>`<div style="display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.85rem">
        <div><strong>${m.player_name}</strong> vs ${m.opponent_name||'?'} <span class="${m.result==='W'?'win':'loss'}">${m.result==='W'?'승':'패'}</span> ${m.score||''}</div>
        <div style="color:var(--text2)">${m.tournament_name||''}</div>
      </div>`).join('')}</div>`:''}`;
}

function gradeColor(g){if(!g)return'var(--card2)';if(g.includes('300'))return'#ef4444';if(g.includes('200'))return'#f59e0b';if(g.includes('100')||g.includes('60'))return'#3b82f6';return'#6b7280'}

// Players
async function loadPlayers(){
  players=await apiFetch('/api/players').then(r=>r.json());
  const genderIcon={M:'👦',F:'👧'};
  document.getElementById('sec-players').innerHTML=`
    <div class="page-header"><h2>👥 선수 관리</h2>
      <button class="btn btn-primary" onclick="openPlayerModal()"><i class="fas fa-plus"></i> 선수 등록</button></div>
    ${players.map(p=>`<div class="card" style="cursor:pointer" onclick="viewPlayer(${p.id})">
      <div class="player-card">
        <div class="player-avatar" style="background:${p.gender==='F'?'rgba(236,72,153,0.15)':'rgba(59,130,246,0.15)'}">${genderIcon[p.gender]||'🎾'}</div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <strong>${p.name}</strong>
            <div style="display:flex;gap:0.3rem">
              ${p.itf_ranking?`<span class="badge" style="background:rgba(245,158,11,0.15);color:var(--warning)">ITF #${p.itf_ranking}</span>`:''}
              <span class="badge" style="background:rgba(255,255,255,0.05)">${p.birth_year||''}년생</span>
            </div>
          </div>
          <div style="font-size:0.82rem;color:var(--text2);margin-top:0.2rem">
            ${p.name_en||''} | ${p.nationality||''} | ${p.dominant_hand==='L'?'왼손':'오른손'}잡이
            ${p.strengths?` | 💪 ${p.strengths}`:''}
          </div>
        </div>
      </div>
    </div>`).join('')||'<div class="card" style="text-align:center;padding:2rem;color:var(--text2)">선수를 등록해주세요</div>'}`;
}

async function viewPlayer(id){
  const p=await apiFetch('/api/players/'+id).then(r=>r.json());
  const gIcon=p.gender==='F'?'👧':'👦';
  document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:600px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">
      <div style="display:flex;gap:0.8rem;align-items:center">
        <div style="font-size:2.5rem">${gIcon}</div>
        <div>
          <h2 style="margin:0">${p.name} <span style="font-size:0.85rem;color:var(--text2)">${p.name_en||''}</span></h2>
          <div style="font-size:0.85rem;color:var(--text2)">${p.birth_year}년생 | ${p.nationality} | ${p.dominant_hand==='L'?'왼손':'오른손'} | ${p.backhand||''}</div>
        </div>
      </div>
      <div style="display:flex;gap:0.3rem">
        <button class="btn btn-sm btn-info" onclick="closeModal();openPlayerModal(${p.id})"><i class="fas fa-edit"></i></button>
        <button class="btn btn-sm btn-danger" onclick="deletePlayer(${p.id})"><i class="fas fa-trash"></i></button>
      </div>
    </div>
    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
      ${p.itf_ranking?`<div class="stat-card"><div class="num" style="color:var(--warning);font-size:1.3rem">#${p.itf_ranking}</div><div class="label">ITF 랭킹</div></div>`:''}
      <div class="stat-card"><div class="num" style="color:var(--success);font-size:1.3rem">${p.matches?.filter(m=>m.result==='W').length||0}</div><div class="label">승</div></div>
      <div class="stat-card"><div class="num" style="color:var(--danger);font-size:1.3rem">${p.matches?.filter(m=>m.result==='L').length||0}</div><div class="label">패</div></div>
    </div>
    ${p.strengths||p.weaknesses?`<div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.8rem">
      ${p.strengths?`<div style="flex:1;min-width:150px;background:rgba(34,197,94,0.08);padding:0.5rem;border-radius:8px;font-size:0.82rem"><strong style="color:var(--success)">💪 강점</strong><div>${p.strengths}</div></div>`:''}
      ${p.weaknesses?`<div style="flex:1;min-width:150px;background:rgba(245,158,11,0.08);padding:0.5rem;border-radius:8px;font-size:0.82rem"><strong style="color:var(--warning)">📈 약점</strong><div>${p.weaknesses}</div></div>`:''}
    </div>`:''}
    ${p.injury_history?`<div style="background:rgba(239,68,68,0.08);padding:0.5rem;border-radius:8px;font-size:0.82rem;margin-bottom:0.8rem"><strong style="color:var(--danger)">🩹 부상 이력</strong><div>${p.injury_history}</div></div>`:''}
    ${p.entries?.length?`<div style="margin-bottom:0.8rem"><strong style="font-size:0.9rem">🏆 대회 참가</strong>
      ${p.entries.slice(0,5).map(e=>`<div style="display:flex;justify-content:space-between;padding:0.3rem 0;font-size:0.82rem;border-bottom:1px solid rgba(255,255,255,0.03)">
        <span>${e.tournament_name} <span class="grade-badge" style="background:${gradeColor(e.grade)}">${e.grade||''}</span></span>
        <span>${e.round_reached||e.entry_status||''}</span>
      </div>`).join('')}</div>`:''}
    ${p.matches?.length?`<div><strong style="font-size:0.9rem">🎾 최근 경기</strong>
      ${p.matches.slice(0,5).map(m=>`<div style="display:flex;justify-content:space-between;padding:0.3rem 0;font-size:0.82rem;border-bottom:1px solid rgba(255,255,255,0.03)">
        <span>vs ${m.opponent_name||'?'} <span class="${m.result==='W'?'win':'loss'}">${m.result==='W'?'승':'패'}</span> ${m.score||''}</span>
        <span style="color:var(--text2)">${m.round||''} | ${m.match_date||''}</span>
      </div>`).join('')}</div>`:''}
  </div></div>`;
}

function openPlayerModal(id){
  const p=id?players.find(x=>x.id===id):null;
  document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3 style="margin:0 0 1rem">${id?'✏️ 선수 수정':'➕ 선수 등록'}</h3>
    <div class="form-row"><div class="form-group"><label>이름 (한글)</label><input id="pl-name" value="${p?.name||''}"></div>
      <div class="form-group"><label>이름 (영문)</label><input id="pl-en" value="${p?.name_en||''}"></div></div>
    <div class="form-row3"><div class="form-group"><label>출생년도</label><input type="number" id="pl-year" value="${p?.birth_year||2010}"></div>
      <div class="form-group"><label>성별</label><select id="pl-gender"><option value="M" ${p?.gender==='M'?'selected':''}>남</option><option value="F" ${p?.gender==='F'?'selected':''}>여</option></select></div>
      <div class="form-group"><label>국적</label><input id="pl-nat" value="${p?.nationality||'MGL'}"></div></div>
    <div class="form-row"><div class="form-group"><label>주 사용 손</label><select id="pl-hand"><option value="R" ${p?.dominant_hand==='R'?'selected':''}>오른손</option><option value="L" ${p?.dominant_hand==='L'?'selected':''}>왼손</option></select></div>
      <div class="form-group"><label>백핸드</label><select id="pl-bh"><option value="two-handed" ${p?.backhand==='two-handed'?'selected':''}>양손</option><option value="one-handed" ${p?.backhand==='one-handed'?'selected':''}>한손</option></select></div></div>
    <div class="form-row"><div class="form-group"><label>키(cm)</label><input type="number" id="pl-h" value="${p?.height_cm||''}"></div>
      <div class="form-group"><label>몸무게(kg)</label><input type="number" id="pl-w" value="${p?.weight_kg||''}"></div></div>
    <div class="form-group"><label>ITF ID</label><input id="pl-itf" value="${p?.itf_id||''}"></div>
    <div class="form-row"><div class="form-group"><label>선수 연락처</label><input id="pl-phone" value="${p?.phone||''}"></div>
      <div class="form-group"><label>학부모 연락처</label><input id="pl-pphone" value="${p?.parent_phone||''}"></div></div>
    <div class="form-group"><label>학부모 이름</label><input id="pl-pname" value="${p?.parent_name||''}"></div>
    <div class="form-group"><label>💪 강점</label><input id="pl-str" value="${p?.strengths||''}" placeholder="예: 강력한 포핸드, 빠른 풋워크"></div>

function setShRate(idx,val){
  document.getElementById('sh-r'+idx).value=val;
  const spans=[...document.getElementById('sh-rate-'+idx).querySelectorAll('span')];
  spans.forEach((s,i)=>s.style.background=i<val?'var(--warning)':'var(--card2)');
}

function shCalc(){
  const s1t=_n('sh-s1t'),s1i=_n('sh-s1i'),s1w=_n('sh-s1w'),s2w=_n('sh-s2w');
  const s1pct=_calcPct(s1i,s1t);
  const s2t=s1t-s1i;
  document.getElementById('sh-s1pct').textContent=s1pct;
  document.getElementById('sh-s1pct-big').textContent=s1pct+'%';
  document.getElementById('sh-s1wpct').textContent=_calcPct(s1w,s1i);
  document.getElementById('sh-s2wpct').textContent=_calcPct(s2w,s2t);
  const fhw=_n('sh-fhw'),bhw=_n('sh-bhw');
  document.getElementById('sh-tw').textContent=fhw+bhw;
  document.getElementById('sh-tue').textContent=_n('sh-fhe')+_n('sh-bhe');
}

async function saveSheetToMatch(type){
  if(!confirm('체크지 내용을 경기 기록으로 저장하시겠습니까?'))return;
  const pid=players.find(p=>p.name===(sheetPlayer||players[0]?.name))?.id||players[0]?.id;
  const s1t=_n('sh-s1t'),s1i=_n('sh-s1i'),s1w=_n('sh-s1w'),s2w=_n('sh-s2w');
  const s2t=s1t-s1i;
  const body={
    player_id:pid,tournament_id:null,
    opponent_name:sheetOpp,opponent_nationality:'',opponent_ranking:null,
    round:'1R',result:_v('sh-result'),score:_v('sh-score'),set_scores:'',
    match_date:sheetDate,duration_min:_n('sh-dur')||null,surface:_v('sh-surf'),weather:'',
    serve_speed_max:_n('sh-smax')||null,serve_speed_avg1:_n('sh-savg1')||null,serve_speed_avg2:_n('sh-savg2')||null,
    serve_1st_pct:_calcPct(s1i,s1t)||null,serve_1st_won:_calcPct(s1w,s1i)||null,serve_2nd_won:_calcPct(s2w,s2t)||null,
    aces:_n('sh-ace')||null,double_faults:_n('sh-df')||null,
    forehand_winners:_n('sh-fhw')||null,backhand_winners:_n('sh-bhw')||null,
    winners:_n('sh-fhw')+_n('sh-bhw')||null,
    unforced_errors:_n('sh-fhe')+_n('sh-bhe')||null,forced_errors:null,
    break_points_won:_n('sh-bpw')?_n('sh-bpw')+'/'+_n('sh-bpo'):null,
    break_points_faced:_n('sh-bfw')?_n('sh-bfw')+'/'+_n('sh-bfo'):null,
    net_points_won:_n('sh-net')?String(_n('sh-net')):null,
    return_1st_won:null,return_2nd_won:null,
    total_points_won:null,total_points_played:null,
    rally_short:null,rally_medium:null,rally_long:null,
    opp_serve_1st_pct:null,opp_aces:_n('sh-oace')||null,opp_df:_n('sh-odf')||null,
    opp_winners:_n('sh-owin')||null,opp_ue:_n('sh-oue')||null,opp_serve_speed_max:null,
    forehand_rating:_n('sh-r0'),backhand_rating:_n('sh-r1'),serve_rating:_n('sh-r2'),
    return_rating:_n('sh-r3'),mental_rating:_n('sh-r4'),movement_rating:_n('sh-r5'),
    physical_rating:_n('sh-r6'),strategy_rating:_n('sh-r7'),consistency_rating:_n('sh-r8'),aggression_rating:_n('sh-r9'),
    serve_direction:null,opponent_style:null,pressure_points:null,injury_status:null,warm_up_notes:null,
    set1_stats:null,set2_stats:null,set3_stats:null,
    coach_notes:_v('sh-note'),tactical_notes:_v('sh-tactic'),improvement_points:null,key_moments:null,video_url:null
  };
  const res=await apiFetch('/api/matches',{method:'POST',body:JSON.stringify(body)});
  const data=await res.json();
  if(data.id){
    const again=confirm('✅ 경기 #'+data.id+' 저장!\n\n다른 경기도 기록할까요?\n확인 = 체크지 초기화\n취소 = 경기 목록');
    if(again){openSheet('full');}
    else{showSection('matches');}
  } else alert('❌ 저장 실패: '+(data.error||''));
}

async function viewMatch(id){

    const n1=parseInt(v1)||0,n2=parseInt(v2)||0,t=n1+n2||1;
    const p1=Math.round(n1/t*100),p2=100-p1;
    return `<div style="margin-bottom:0.6rem">
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:0.15rem">
        <span style="font-weight:700;${p1>p2?'color:var(--success)':''}">${v1}</span>
        <span style="font-size:0.75rem;color:var(--text2)">${label}</span>
        <span style="font-weight:700;${p2>p1?'color:var(--success)':''}">${v2}</span>
      </div>
      <div style="display:flex;height:6px;border-radius:3px;overflow:hidden;gap:2px">
        <div style="width:${p1}%;background:${p1>p2?'var(--success)':'var(--info)'};border-radius:3px"></div>

        <div><div style="font-size:1.3rem;font-weight:700;color:var(--danger)">${m.rally_long||0}</div><div style="color:var(--text2);font-size:0.7rem">9+ shots</div></div>
      </div>
    </div>`:''}

    <!-- COACH RATING -->
    <div style="margin-bottom:1rem">
      <div style="text-align:center;font-size:0.8rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem;border-bottom:1px solid var(--card2);padding-bottom:0.3rem">COACH RATING</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.4rem">
        ${[['forehand_rating','포핸드','🎾'],['backhand_rating','백핸드','🏸'],['serve_rating','서브','🎯'],['return_rating','리턴','🛡️'],['mental_rating','멘탈','🧠'],['movement_rating','움직임','🏃'],['physical_rating','체력','💪'],['strategy_rating','전략','🎯'],['consistency_rating','일관성','📊'],['aggression_rating','공격성','⚡']].map(([k,l,i])=>{
          const v=m[k]||3;
          return `<div style="text-align:center;padding:0.4rem;background:var(--bg);border-radius:8px">

            <div style="font-size:0.7rem;color:var(--text2)">${l}</div>
            <div style="color:var(--warning);font-size:0.85rem">${'★'.repeat(v)}${'☆'.repeat(5-v)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- COACH ANALYSIS -->
    ${m.coach_notes||m.tactical_notes||m.key_moments||m.improvement_points?`<div style="margin-bottom:1rem">
      <div style="text-align:center;font-size:0.8rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem;border-bottom:1px solid var(--card2);padding-bottom:0.3rem">COACH ANALYSIS</div>
      ${m.coach_notes?`<div style="background:var(--bg);padding:0.5rem;border-radius:8px;margin-bottom:0.4rem;border-left:3px solid var(--info)"><div style="font-size:0.7rem;color:var(--info);font-weight:600">총평</div><div style="font-size:0.82rem;white-space:pre-line">${m.coach_notes}</div></div>`:''}
      ${m.tactical_notes?`<div style="background:var(--bg);padding:0.5rem;border-radius:8px;margin-bottom:0.4rem;border-left:3px solid var(--accent)"><div style="font-size:0.7rem;color:var(--accent);font-weight:600">전술 분석</div><div style="font-size:0.82rem;white-space:pre-line">${m.tactical_notes}</div></div>`:''}
      ${m.key_moments?`<div style="background:var(--bg);padding:0.5rem;border-radius:8px;margin-bottom:0.4rem;border-left:3px solid var(--warning)"><div style="font-size:0.7rem;color:var(--warning);font-weight:600">핵심 순간</div><div style="font-size:0.82rem;white-space:pre-line">${m.key_moments}</div></div>`:''}
      ${m.improvement_points?`<div style="background:var(--bg);padding:0.5rem;border-radius:8px;border-left:3px solid var(--success)"><div style="font-size:0.7rem;color:var(--success);font-weight:600">개선 포인트</div><div style="font-size:0.82rem;white-space:pre-line">${m.improvement_points}</div></div>`:''}
    </div>`:''}

    <!-- DETAILED ANALYSIS -->
    ${m.serve_direction||m.opponent_style||m.pressure_points||m.set1_stats?`<div style="margin-bottom:1rem">
      <div style="text-align:center;font-size:0.8rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem;border-bottom:1px solid var(--card2);padding-bottom:0.3rem">DETAILED ANALYSIS</div>
      ${m.serve_direction?`<div style="background:var(--bg);padding:0.5rem;border-radius:8px;margin-bottom:0.4rem;border-left:3px solid var(--primary)"><div style="font-size:0.7rem;color:var(--primary);font-weight:600">🎯 서브 방향</div><div style="font-size:0.82rem;white-space:pre-line">${m.serve_direction}</div></div>`:''}
      ${m.opponent_style?`<div style="background:var(--bg);padding:0.5rem;border-radius:8px;margin-bottom:0.4rem;border-left:3px solid var(--accent)"><div style="font-size:0.7rem;color:var(--accent);font-weight:600">🆚 상대 스타일</div><div style="font-size:0.82rem">${m.opponent_style}</div></div>`:''}
      ${m.pressure_points?`<div style="background:var(--bg);padding:0.5rem;border-radius:8px;margin-bottom:0.4rem;border-left:3px solid var(--danger)"><div style="font-size:0.7rem;color:var(--danger);font-weight:600">💥 프레셔 포인트</div><div style="font-size:0.82rem;white-space:pre-line">${m.pressure_points}</div></div>`:''}
      ${m.injury_status?`<div style="background:var(--bg);padding:0.5rem;border-radius:8px;margin-bottom:0.4rem;border-left:3px solid #ec4899"><div style="font-size:0.7rem;color:#ec4899;font-weight:600">🏥 부상</div><div style="font-size:0.82rem">${m.injury_status}</div></div>`:''}
      ${m.set1_stats||m.set2_stats||m.set3_stats?`<div style="background:var(--bg);padding:0.5rem;border-radius:8px;margin-bottom:0.4rem;border-left:3px solid var(--warning)"><div style="font-size:0.7rem;color:var(--warning);font-weight:600">📊 세트별 분석</div>
        ${m.set1_stats?`<div style="font-size:0.82rem"><strong>1세트:</strong> ${m.set1_stats}</div>`:''}
        ${m.set2_stats?`<div style="font-size:0.82rem"><strong>2세트:</strong> ${m.set2_stats}</div>`:''}
        ${m.set3_stats?`<div style="font-size:0.82rem"><strong>3세트:</strong> ${m.set3_stats}</div>`:''}
      </div>`:''}
    </div>`:''}

    ${m.video_url?`<a href="${m.video_url}" target="_blank" class="btn btn-info" style="width:100%;justify-content:center;margin-bottom:0.8rem"><i class="fas fa-video"></i> 경기 영상</a>`:''}

    <div style="display:flex;gap:0.5rem;justify-content:flex-end">
      <button class="btn btn-info" onclick="closeModal();openMatchModal(${m.id})"><i class="fas fa-edit"></i> 수정</button>
      <button class="btn" style="background:var(--card2)" onclick="closeModal()">닫기</button>
    </div>
    </div>
  </div></div>`;
}

async function openMatchModal(id){
  if(!players.length)players=await apiFetch('/api/players').then(r=>r.json());
  if(!tournaments.length)tournaments=await apiFetch('/api/tournaments').then(r=>r.json());
  const m=id?await apiFetch('/api/matches/'+id).then(r=>r.json()):null;
  const rs=(fid,val,label)=>`<div class="form-group"><label>${label}</label><div style="display:flex;gap:2px">${[1,2,3,4,5].map(n=>`<span onclick="this.parentElement.dataset.val=${n};[...this.parentElement.children].forEach((c,i)=>c.style.background=i<${n}?'var(--warning)':'var(--card2)')" style="flex:1;text-align:center;padding:4px;border-radius:4px;cursor:pointer;font-size:0.8rem;background:${(val||3)>=n?'var(--warning)':'var(--card2)'}">${n}</span>`).join('')}</div><input type="hidden" id="${fid}" value="${val||3}"></div>`;

  const v=n=>n||'';
  document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:550px;padding:0;overflow:hidden">

    <div style="padding:0.8rem 1rem 0;display:flex;justify-content:space-between;align-items:center">

      <span onclick="closeModal()" style="cursor:pointer;font-size:1.2rem;color:var(--text2)">✕</span>
    </div>

    <div style="display:flex;gap:2px;padding:0.5rem 1rem;overflow-x:auto" id="mt-tabs">
      <span class="badge" style="cursor:pointer;padding:6px 10px;white-space:nowrap;background:var(--accent);color:#000" onclick="mtTab(0)">1.기본</span>
      <span class="badge" style="cursor:pointer;padding:6px 10px;white-space:nowrap;background:var(--card2)" onclick="mtTab(1)">2.통계</span>
      <span class="badge" style="cursor:pointer;padding:6px 10px;white-space:nowrap;background:var(--card2)" onclick="mtTab(2)">3.평가</span>
      <span class="badge" style="cursor:pointer;padding:6px 10px;white-space:nowrap;background:var(--card2)" onclick="mtTab(3)">4.분석</span>
    </div>

    <div style="padding:0.8rem 1rem;max-height:65vh;overflow-y:auto">

    <!-- TAB 1: 기본 -->
    <div class="mt-panel" id="mt-p0">
      <div class="form-row"><div class="form-group"><label>선수</label><select id="mt-player">${players.map(p=>`<option value="${p.id}" ${m?.player_id===p.id?'selected':''}>${p.name}</option>`).join('')}</select></div>
        <div class="form-group"><label>대회</label><select id="mt-tourn"><option value="">없음</option>${tournaments.map(t=>`<option value="${t.id}" ${m?.tournament_id===t.id?'selected':''}>${t.name}</option>`).join('')}</select></div></div>
      <div class="form-row"><div class="form-group"><label>날짜</label><input type="date" id="mt-date" value="${m?.match_date||todayUB()}"></div>
        <div class="form-group"><label>라운드</label><select id="mt-round">${['예선','1R','2R','3R','16강','QF','SF','F'].map(r=>`<option ${m?.round===r?'selected':''}>${r}</option>`).join('')}</select></div></div>
      <div class="form-row"><div class="form-group"><label>코트</label><select id="mt-surf">${[['hard','하드'],['clay','클레이'],['grass','잔디'],['indoor','실내']].map(([v,l])=>`<option value="${v}" ${m?.surface===v?'selected':''}>${l}</option>`).join('')}</select></div>
        <div class="form-group"><label>결과</label><select id="mt-result">${[['W','🏆 승'],['L','패'],['WO','WO'],['RET','기권']].map(([v,l])=>`<option value="${v}" ${m?.result===v?'selected':''}>${l}</option>`).join('')}</select></div></div>
      <div class="form-group"><label>스코어</label><input id="mt-score" value="${v(m?.score)}" placeholder="6-4 3-6 7-5" style="font-size:1.2rem;font-weight:700;letter-spacing:3px;text-align:center"></div>
      <div class="form-row"><div class="form-group"><label>상대 이름</label><input id="mt-opp" value="${v(m?.opponent_name)}"></div>
        <div class="form-group"><label>국적/랭킹</label><input id="mt-oppnat" value="${v(m?.opponent_nationality)}" placeholder="KOR #45"></div></div>
      <div class="form-row"><div class="form-group"><label>ITF#</label><input type="number" id="mt-rank" value="${v(m?.opponent_ranking)}"></div>
        <div class="form-group"><label>시간(분)</label><input type="number" id="mt-dur" value="${v(m?.duration_min)}"></div></div>
      <div class="form-row"><div class="form-group"><label>날씨</label><input id="mt-weather" value="${v(m?.weather)}" placeholder="맑음"></div>
        <div class="form-group"><label>상대 스타일</label><input id="mt-oppstyle" value="${v(m?.opponent_style)}" placeholder="공격형"></div></div>
      <div style="text-align:right;margin-top:0.5rem"><span onclick="mtTab(1)" style="color:var(--accent);cursor:pointer;font-size:0.85rem">다음 → 통계</span></div>
    </div>

      </div>
      <div class="form-row3">
        <div class="form-group"><label>서브 최고속</label><input type="number" id="mt-smax" value="${v(m?.serve_speed_max)}" placeholder="km/h"></div>
        <div class="form-group"><label>1st 평균</label><input type="number" id="mt-savg1" value="${v(m?.serve_speed_avg1)}"></div>
        <div class="form-group"><label>2nd 평균</label><input type="number" id="mt-savg2" value="${v(m?.serve_speed_avg2)}"></div>
      </div>

      <strong style="font-size:0.82rem;color:var(--text2);margin-top:0.5rem;display:block">💥 포인트</strong>
      <div class="form-row">

        <div class="form-group"><label>BH 위너</label><input type="number" id="mt-bhw" value="${v(m?.backhand_winners)}" oninput="calcPoints()"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label style="color:var(--success)">→ 총 위너 <span id="calc-win">0</span></label><input type="hidden" id="mt-win" value="${v(m?.winners)}"></div>
        <div class="form-group"><label>비강제 에러</label><input type="number" id="mt-ue" value="${v(m?.unforced_errors)}"></div>

        <div class="form-group"><label>강제 에러</label><input type="number" id="mt-fe" value="${v(m?.forced_errors)}"></div>
        <div class="form-group"><label>네트 득점</label><input id="mt-net" value="${v(m?.net_points_won)}" placeholder="8/12"></div>

      </div>
      <div class="form-row"><div class="form-group"><label>🎬 영상 URL</label><input id="mt-vid" value="${v(m?.video_url)}" placeholder="https://..."></div>
        <div class="form-group"><label>세트별 상세</label><input id="mt-sets" value="${v(m?.set_scores)}"></div></div>
      <div class="form-group"><label>📏 랠리 길이</label><div class="form-row3"><input type="number" id="mt-rs" value="${v(m?.rally_short)}" placeholder="Short 0~4"><input type="number" id="mt-rm" value="${v(m?.rally_medium)}" placeholder="Med 5~8"><input type="number" id="mt-rl" value="${v(m?.rally_long)}" placeholder="Long 9+"></div></div>
      <div style="text-align:left;margin-top:0.5rem"><span onclick="mtTab(2)" style="color:var(--text2);cursor:pointer;font-size:0.85rem">← 평가</span></div>
    </div>

    </div>
    <div style="display:flex;gap:0.5rem;justify-content:flex-end;padding:0.8rem 1rem;border-top:1px solid var(--card2)">
      <button class="btn" style="background:var(--card2)" onclick="closeModal()">취소</button>
      ${!id?`<button class="btn" style="background:var(--success);color:#fff" onclick="saveMatch(null)">💾 저장+추가</button>`:''}
      <button class="btn btn-primary" onclick="saveMatch(${id||'null'})">${id?'💾 저장':'💾 저장'}</button>
    </div>
  </div></div>`;
  // 별점 클릭 핸들러 연결
  document.querySelectorAll('[id^="mt-fh"],[id^="mt-bh"],[id^="mt-sv"],[id^="mt-rt"],[id^="mt-mn"],[id^="mt-mv"],[id^="mt-ph"],[id^="mt-st"],[id^="mt-cs"],[id^="mt-ag"]').forEach(inp=>{
    const wrap=inp.previousElementSibling;
    if(wrap&&wrap.children.length===5){
      [...wrap.children].forEach((sp,i)=>{sp.onclick=()=>{wrap.dataset.val=i+1;inp.value=i+1;[...wrap.children].forEach((c,j)=>c.style.background=j<=i?'var(--warning)':'var(--card2)');}});
    }
  });
  calcServe();calcPoints();
}
function mtTab(n){
  document.querySelectorAll('.mt-panel').forEach((p,i)=>p.style.display=i===n?'block':'none');
  [...document.getElementById('mt-tabs').children].forEach((t,i)=>{t.style.background=i===n?'var(--accent)':'var(--card2)';t.style.color=i===n?'#000':'';});
}
function calcServe(){
  const t=Number(document.getElementById('mt-s1total')?.value)||0;
  const i=Number(document.getElementById('mt-s1in')?.value)||0;
  const w1=Number(document.getElementById('mt-s1won-n')?.value)||0;
  const w2=Number(document.getElementById('mt-s2won-n')?.value)||0;
  const pct=t?Math.round(i/t*100):0;
  const s1w=i?Math.round(w1/i*100):0;
  const s2t=t-i;
  const s2w=s2t?Math.round(w2/s2t*100):0;
  document.getElementById('calc-s1pct').textContent=pct+'%';
  document.getElementById('calc-s1won').textContent=s1w+'%';
  document.getElementById('calc-s2won').textContent=s2w+'%';
  document.getElementById('mt-s1pct').value=pct;
  document.getElementById('mt-s1won').value=s1w;
  document.getElementById('mt-s2won').value=s2w;
}
function calcPoints(){
  const fh=Number(document.getElementById('mt-fhw')?.value)||0;
  const bh=Number(document.getElementById('mt-bhw')?.value)||0;
  const tot=fh+bh;
  document.getElementById('calc-win').textContent=tot;
  document.getElementById('mt-win').value=tot||'';
}

async function saveMatch(id){
  const body={
    player_id:Number(g('mt-player')),tournament_id:Number(g('mt-tourn'))||null,
    opponent_name:g('mt-opp'),opponent_ranking:Number(g('mt-rank'))||null,opponent_nationality:g('mt-oppnat'),
    round:g('mt-round'),result:g('mt-result'),score:g('mt-score'),set_scores:g('mt-sets'),
    match_date:g('mt-date'),duration_min:Number(g('mt-dur'))||null,
    surface:g('mt-surf'),weather:g('mt-weather'),
    serve_speed_max:Number(g('mt-smax'))||null,serve_speed_avg1:Number(g('mt-savg1'))||null,serve_speed_avg2:Number(g('mt-savg2'))||null,
    serve_1st_pct:Number(g('mt-s1pct'))||null,serve_1st_won:Number(g('mt-s1won'))||null,serve_2nd_won:Number(g('mt-s2won'))||null,
    aces:Number(g('mt-aces'))||null,double_faults:Number(g('mt-df'))||null,
    winners:Number(g('mt-win'))||null,unforced_errors:Number(g('mt-ue'))||null,forced_errors:Number(g('mt-fe'))||null,
    break_points_won:g('mt-bpw'),break_points_faced:g('mt-bpf'),net_points_won:g('mt-net'),
    return_1st_won:g('mt-r1w'),return_2nd_won:g('mt-r2w'),
    total_points_won:Number(g('mt-tpw'))||null,total_points_played:Number(g('mt-tpp'))||null,
    rally_short:Number(g('mt-rs'))||null,rally_medium:Number(g('mt-rm'))||null,rally_long:Number(g('mt-rl'))||null,
    opp_serve_1st_pct:Number(g('mt-os1'))||null,opp_aces:Number(g('mt-oace'))||null,opp_df:Number(g('mt-odf'))||null,
    opp_winners:Number(g('mt-owin'))||null,opp_ue:Number(g('mt-oue'))||null,opp_serve_speed_max:Number(g('mt-osmax'))||null,
    forehand_winners:Number(g('mt-fhw'))||null,backhand_winners:Number(g('mt-bhw'))||null,
    forehand_rating:Number(g('mt-fh')),backhand_rating:Number(g('mt-bh')),serve_rating:Number(g('mt-sv')),
    return_rating:Number(g('mt-rt')),mental_rating:Number(g('mt-mn')),movement_rating:Number(g('mt-mv')),
    physical_rating:Number(g('mt-ph')),strategy_rating:Number(g('mt-st')),consistency_rating:Number(g('mt-cs')),aggression_rating:Number(g('mt-ag')),
    serve_direction:g('mt-sdir'),opponent_style:g('mt-oppstyle'),pressure_points:g('mt-pressure'),
    injury_status:g('mt-injury'),warm_up_notes:g('mt-warmup'),
    set1_stats:g('mt-set1'),set2_stats:g('mt-set2'),set3_stats:g('mt-set3'),
    coach_notes:g('mt-note'),tactical_notes:g('mt-tactic'),improvement_points:g('mt-improve'),key_moments:g('mt-key'),
    video_url:g('mt-vid')
  };
  const res=await apiFetch(id?'/api/matches/'+id:'/api/matches',{method:id?'PUT':'POST',body:JSON.stringify(body)});
  const data=await res.json();
  if(id){closeModal();loadMatches();return;}
  // 새 경기: 연속 추가 옵션
  if(data.id){
    const again=confirm('✅ 경기 #'+data.id+' 저장!\n\n같은 선수로 다른 경기 추가할까요?\n\n확인 = 계속 추가\n취소 = 목록으로');
    if(again){
      // 상대/스코어/시간만 초기화, 선수/대회/날짜는 유지
      ['mt-opp','mt-oppnat','mt-rank','mt-score','mt-sets','mt-dur','mt-weather',
       'mt-smax','mt-savg1','mt-savg2','mt-s1total','mt-s1in','mt-s1won-n','mt-s2won-n',
       'mt-aces','mt-df','mt-fhw','mt-bhw','mt-win','mt-ue','mt-fe','mt-net',
       'mt-bpw','mt-bpf','mt-tpw','mt-tpp','mt-r1w','mt-r2w',
       'mt-os1','mt-oace','mt-odf','mt-owin','mt-oue','mt-osmax',
       'mt-rs','mt-rm','mt-rl','mt-sdir','mt-oppstyle','mt-pressure',
       'mt-injury','mt-warmup','mt-set1','mt-set2','mt-set3',
       'mt-note','mt-tactic','mt-key','mt-improve','mt-vid'].forEach(id=>{
        const el=document.getElementById(id);
        if(el)el.value='';
      });
      // 자동 계산 초기화
      ['calc-s1pct','calc-s1won','calc-s2won','calc-win'].forEach(id=>{
        const el=document.getElementById(id);if(el)el.textContent='0';
      });
      mtTab(0); // 기본 탭으로
    } else {
      closeModal();loadMatches();
    }
  } else {
    alert('❌ 저장 실패');closeModal();loadMatches();
  }
}
async function deleteMatch(id){if(!confirm('삭제?'))return;await apiFetch('/api/matches/'+id,{method:'DELETE'});loadMatches()}
