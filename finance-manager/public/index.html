<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>재무 관리</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--income:#22c55e;--expense:#ef4444;--primary:#8b5cf6;--info:#3b82f6;--warning:#f59e0b;--text:#f1f5f9;--text2:#94a3b8;--sidebar-w:240px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.sidebar{overflow-y:auto;-webkit-overflow-scrolling:touch;position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;background:var(--card);padding:1rem;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.logo{font-size:1.1rem;font-weight:800;padding:0.5rem;margin-bottom:1rem;color:var(--primary)}
.nav-item{padding:0.7rem 0.8rem;border-radius:10px;cursor:pointer;font-size:0.88rem;margin:2px 0;transition:all .2s;display:flex;align-items:center;gap:0.6rem;color:var(--text2)}
.nav-item:hover,.nav-item.active{background:rgba(139,92,246,0.15);color:var(--primary)}
.main{margin-left:var(--sidebar-w);padding:1.5rem;min-height:100vh}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:0.5rem}
.page-header h2{font-size:1.3rem;font-weight:700}
.card{background:var(--card);border-radius:16px;padding:1.2rem;margin-bottom:1rem}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat{background:var(--card);border-radius:16px;padding:1.2rem;position:relative;overflow:hidden}
.stat-value{font-size:1.6rem;font-weight:800;margin:0.3rem 0}
.stat-label{color:var(--text2);font-size:0.82rem}
.stat-change{font-size:0.75rem;font-weight:600}
.biz-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;margin-bottom:1.5rem}
.biz-card{border-radius:16px;padding:1.2rem;position:relative;overflow:hidden}
.biz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.5rem 1rem;border:none;border-radius:10px;cursor:pointer;font-size:0.85rem;font-weight:600;transition:all .2s;color:white}
.btn-income{background:var(--income)}.btn-expense{background:var(--expense)}
.btn-primary{background:var(--primary)}.btn-info{background:var(--info)}
.btn-sm{padding:0.35rem 0.7rem;font-size:0.8rem}
.btn-danger{background:var(--expense)}
input,select,textarea{width:100%;padding:0.6rem 0.8rem;border:1px solid var(--card2);border-radius:10px;background:var(--bg);color:var(--text);font-size:0.9rem;outline:none}
input:focus,select:focus{border-color:var(--primary)}
.form-group{margin-bottom:0.8rem}
.form-group label{display:block;font-size:0.8rem;color:var(--text2);margin-bottom:0.3rem;font-weight:600}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
th{text-align:left;padding:0.6rem;color:var(--text2);border-bottom:1px solid var(--card2);font-weight:600;font-size:0.78rem}
td{padding:0.6rem;border-bottom:1px solid rgba(255,255,255,0.03)}
tr:hover{background:rgba(255,255,255,0.02)}
.badge{padding:0.2rem 0.6rem;border-radius:20px;font-size:0.72rem;font-weight:600;display:inline-block}
.section{display:none}.section.active{display:block}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--card);border-radius:20px;padding:1.5rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.hamburger{display:none;position:fixed;top:1rem;left:1rem;z-index:101;background:var(--card);border:none;color:var(--text);font-size:1.3rem;padding:0.5rem 0.7rem;border-radius:10px;cursor:pointer}
.tx-income{color:var(--income);font-weight:700}.tx-expense{color:var(--expense);font-weight:700}
.quick-btns{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.sidebar{overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.hamburger{display:block}.main{margin-left:0;padding:1rem}.form-row{grid-template-columns:1fr}.stat-grid{grid-template-columns:1fr 1fr}.biz-grid{grid-template-columns:1fr}}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
#app-screen{display:none}
</style>
</head>
<body>

<div id="login-screen">
  <div class="card" style="width:100%;max-width:380px;text-align:center;padding:2rem">
    <div style="font-size:3rem;margin-bottom:0.5rem">💰</div>
    <h2 style="margin:0 0 0.3rem;color:var(--primary)">재무 관리</h2>
    <p style="color:var(--text2);margin-bottom:1.5rem;font-size:0.85rem">입금 · 지출 · 현황</p>
    <div class="form-group"><label>아이디</label><input id="login-user" placeholder="아이디"></div>
    <div class="form-group"><label>비밀번호</label><input type="password" id="login-pass" placeholder="비밀번호"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem;font-size:1rem" onclick="doLogin()">로그인</button>
    <button id="login-lang-toggle" class="btn btn-sm" style="background:var(--card2);width:100%;justify-content:center;margin-top:0.75rem;padding:0.6rem" onclick="switchLang()">🇲🇳 Монгол</button>
    <p id="login-error" style="color:var(--expense);font-size:0.85rem;margin-top:0.5rem"></p>
  </div>
</div>

<div id="app-screen">
<button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
<div class="sidebar">
  <div class="logo">💰 재무 관리</div>
  <a href="/center/portal" class="nav-item" style="background:rgba(139,92,246,0.1);margin-bottom:8px;text-decoration:none;color:var(--text2)"><i class="fas fa-th-large"></i> ← 포털</a>
  <div class="nav-item active" onclick="showSection('dashboard')"><i class="fas fa-chart-line"></i> 현황판</div>
  <div class="nav-item" onclick="showSection('income')"><i class="fas fa-arrow-down" style="color:var(--income)"></i> 입금</div>
  <div class="nav-item" onclick="showSection('expense')"><i class="fas fa-arrow-up" style="color:var(--expense)"></i> 지출</div>
  <div class="nav-item" onclick="showSection('history')"><i class="fas fa-list"></i> 거래 내역</div>
  <div class="nav-item" onclick="showSection('employees')"><i class="fas fa-users"></i> 직원/급여</div>
  <div class="nav-item" onclick="showSection('fixed')"><i class="fas fa-calendar-check"></i> 고정비용</div>
  <div class="nav-item" onclick="showSection('tax')"><i class="fas fa-receipt" style="color:#f97316"></i> 세금</div>
  <div class="nav-item" onclick="showSection('reports')"><i class="fas fa-chart-pie"></i> 리포트</div>
  <div class="nav-item" onclick="showSection('excel')"><i class="fas fa-file-excel" style="color:#22c55e"></i> 엑셀 업로드 Excel оруулах</div>
  <div class="nav-item" onclick="showSection('notices')"><i class="fas fa-bullhorn"></i> 공지사항</div>
  <div class="nav-item" onclick="showSection('inventory')"><i class="fas fa-boxes"></i> 재고관리</div>
  <div class="nav-item" onclick="showSection('dreports')"><i class="fas fa-file-alt"></i> 일일보고서</div>
  <div class="nav-item" onclick="showSection('goals')"><i class="fas fa-bullseye"></i> 목표매출</div>
  <div class="nav-item" onclick="showSection('attendance')"><i class="fas fa-clock"></i> 근태현황</div>
  <div class="nav-item" onclick="showSection('checklist')"><i class="fas fa-tasks"></i> 체크리스트</div>
  <div class="nav-item" onclick="showSection('settings')"><i class="fas fa-cog"></i> 설정</div>
  <div style="flex:1"></div>
  <button id="lang-toggle" class="btn btn-sm" style="background:var(--card2);width:100%;justify-content:center;margin-bottom:0.5rem" onclick="switchLang()">🇲🇳 Монгол</button>
  <button class="btn btn-sm" style="background:var(--card2);width:100%;justify-content:center" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 로그아웃</button>
</div>

<div class="main">
  <div class="section active" id="sec-dashboard"></div>
  <div class="section" id="sec-income"></div>
  <div class="section" id="sec-expense"></div>
  <div class="section" id="sec-history"></div>
  <div class="section" id="sec-employees"></div>
  <div class="section" id="sec-fixed"></div>
  <div class="section" id="sec-tax"></div>
  <div class="section" id="sec-reports"></div>
  <div class="section" id="sec-excel"></div>
  <div class="section" id="sec-notices"></div>
  <div class="section" id="sec-inventory"></div>
  <div class="section" id="sec-dreports"></div>
  <div class="section" id="sec-goals"></div>
  <div class="section" id="sec-attendance"></div>
  <div class="section" id="sec-checklist"></div>
  <div class="section" id="sec-settings"></div>
</div>
</div>
<div id="modal-container"></div>

<script>
const API = window.location.pathname.replace(/\/+$/, '');
let authToken = localStorage.getItem('fin_token') || (document.cookie.match(/fin_token=([^;]+)/) || [])[1] || null;
let currentUser = (function(){try{var v=localStorage.getItem('fin_user');if(v)return JSON.parse(v)}catch(e){}try{var c=(document.cookie.match(/fin_user=([^;]+)/)||[])[1];if(c)return JSON.parse(decodeURIComponent(c))}catch(e){}return null})();
let businesses = [], categories = [];
let currentLang = localStorage.getItem('fin_lang') || 'ko';

const i18n = {
  ko: {
    appTitle:'재무 관리', subtitle:'입금 · 지출 · 현황', login:'로그인',
    username:'아이디', password:'비밀번호', logout:'로그아웃',
    langBtn:'🇲🇳 Монгол',
    dashboard:'현황판', income:'입금', expense:'지출', history:'거래 내역',
    employees:'직원/급여', fixedCosts:'고정비용', reports:'리포트',
    monthIncome:'이번 달 입금', monthExpense:'이번 달 지출', monthProfit:'이번 달 순이익',
    totalFixed:'월 고정비용', empCount:'직원 수', totalSalary:'총 급여',
    vsLastMonth:'전월 대비', today:'오늘', thisMonth:'이번 달',
    bizStatus:'사업장별 현황', recentTx:'최근 거래',
    date:'날짜', biz:'사업장', category:'항목', amount:'금액',
    desc:'내용', payment:'결제', type:'구분', memo:'메모',
    addIncome:'입금 등록', addExpense:'지출 등록',
    selectBiz:'사업장 선택', selectCat:'항목 선택', save:'저장', cancel:'취소',
    amountPh:'금액 입력', descPh:'내용 입력',
    cash:'현금', card:'카드', qpay:'QPay', transfer:'계좌이체',
    all:'전체', search:'조회', delete:'삭제', deleteConfirm:'삭제하시겠습니까?',
    name:'이름', position:'직위', phone:'전화', salary:'급여',
    addEmployee:'직원 등록', editEmployee:'직원 수정', payroll:'급여 지급',
    payMonth:'급여 월', bonus:'보너스', deduction:'공제', netPay:'실지급액',
    addFixed:'고정비용 등록', dueDay:'납부일', perMonth:'/ 월',
    expenseBreakdown:'지출 항목별', monthlyTrend:'월별 추이',
    profit:'순이익', person:'명', won:'₮',
  },
  mn: {
    appTitle:'Санхүүгийн удирдлага', subtitle:'Орлого · Зарлага · Тойм', login:'Нэвтрэх',
    username:'Хэрэглэгч', password:'Нууц үг', logout:'Гарах',
    langBtn:'🇰🇷 한국어',
    dashboard:'Хянах самбар', income:'Орлого', expense:'Зарлага', history:'Гүйлгээний түүх',
    employees:'Ажилтан/Цалин', fixedCosts:'Тогтмол зардал', reports:'Тайлан',
    monthIncome:'Энэ сарын орлого', monthExpense:'Энэ сарын зарлага', monthProfit:'Энэ сарын цэвэр ашиг',
    totalFixed:'Сарын тогтмол зардал', empCount:'Ажилтны тоо', totalSalary:'Нийт цалин',
    vsLastMonth:'Өмнөх сартай харьцуулбал', today:'Өнөөдөр', thisMonth:'Энэ сар',
    bizStatus:'Салбар тус бүрийн байдал', recentTx:'Сүүлийн гүйлгээ',
    date:'Огноо', biz:'Салбар', category:'Ангилал', amount:'Дүн',
    desc:'Тайлбар', payment:'Төлбөр', type:'Төрөл', memo:'Тэмдэглэл',
    addIncome:'Орлого бүртгэх', addExpense:'Зарлага бүртгэх',
    selectBiz:'Салбар сонгох', selectCat:'Ангилал сонгох', save:'Хадгалах', cancel:'Цуцлах',
    amountPh:'Дүн оруулах', descPh:'Тайлбар оруулах',
    cash:'Бэлэн мөнгө', card:'Карт', qpay:'QPay', transfer:'Шилжүүлэг',
    all:'Бүгд', search:'Хайх', delete:'Устгах', deleteConfirm:'Устгах уу?',
    name:'Нэр', position:'Албан тушаал', phone:'Утас', salary:'Цалин',
    addEmployee:'Ажилтан бүртгэх', editEmployee:'Ажилтан засах', payroll:'Цалин олгох',
    payMonth:'Цалингийн сар', bonus:'Урамшуулал', deduction:'Суутгал', netPay:'Цэвэр цалин',
    addFixed:'Тогтмол зардал бүртгэх', dueDay:'Төлөх өдөр', perMonth:'/ сар',
    expenseBreakdown:'Зарлагын задаргаа', monthlyTrend:'Сарын чиг хандлага',
    profit:'Цэвэр ашиг', person:'хүн', won:'₮',
  }
};

function t(k){return i18n[currentLang]?.[k]||i18n.ko[k]||k}
function switchLang(){currentLang=currentLang==='ko'?'mn':'ko';localStorage.setItem('fin_lang',currentLang);applyLang()}
function applyLang(){
  try{
    const lt=document.querySelector('#login-screen h2');if(lt)lt.textContent=t('appTitle');
    const ls=document.querySelector('#login-screen .card > p');if(ls)ls.textContent=t('subtitle');
    const ll=document.querySelectorAll('#login-screen .form-group label');
    if(ll[0])ll[0].textContent=t('username');if(ll[1])ll[1].textContent=t('password');
    const lb=document.querySelector('#login-screen .btn-primary');if(lb)lb.textContent=t('login');
    const llb=document.getElementById('login-lang-toggle');if(llb)llb.textContent=t('langBtn');
    const navItems=document.querySelectorAll('.nav-item');
    const nk=['dashboard','income','expense','history','employees','fixedCosts','reports'];
    const ni=['fa-chart-line','fa-arrow-down','fa-arrow-up','fa-list','fa-users','fa-calendar-check','fa-chart-pie'];
    navItems.forEach((el,i)=>{if(nk[i]){const ic=el.querySelector('i');if(ic)el.innerHTML=ic.outerHTML+' '+t(nk[i])}});
    const logo=document.querySelector('.logo');if(logo)logo.textContent='💰 '+t('appTitle');
    const lo=document.querySelector('[onclick="logout()"]');if(lo)lo.innerHTML='<i class="fas fa-sign-out-alt"></i> '+t('logout');
    const lg=document.getElementById('lang-toggle');if(lg)lg.textContent=t('langBtn');
    if(authToken&&currentUser){const as=document.querySelector('.section.active');if(as){showSection(as.id.replace('sec-',''))}}
  }catch(e){console.log('applyLang:',e)}
}

function g(id){const el=document.getElementById(id);return el?.value?.trim?.()??el?.value??''}
function formatMoney(n){return '₮'+Math.round(Number(n||0)).toLocaleString()}

async function doLogin(){
  try{
    const url=API+'/api/login';
    console.log('Login URL:',url);
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:g('login-user'),password:g('login-pass')})});
    const data=await res.json();
    if(!res.ok){document.getElementById('login-error').textContent=data.error;return}
    authToken=data.token;currentUser=data.user;
    localStorage.setItem("fin_token",authToken);localStorage.setItem("fin_user",JSON.stringify(currentUser));document.cookie="fin_token="+authToken+";path=/;max-age="+(30*24*60*60)+";SameSite=Lax";document.cookie="fin_user="+encodeURIComponent(JSON.stringify(currentUser))+";path=/;max-age="+(30*24*60*60)+";SameSite=Lax";
    initApp();
  }catch(e){document.getElementById('login-error').textContent='연결 오류: '+e.message;console.error(e)}
}
function logout(){document.cookie='fin_token=;path=/;max-age=0';document.cookie='fin_user=;path=/;max-age=0';try{localStorage.removeItem('fin_token');localStorage.removeItem('fin_user')}catch(e){}location.reload()}

async function initApp(){
  document.getElementById('login-screen').style.display='none';
  const h={Authorization:'Bearer '+authToken};
  const bizRes=await fetch(API+'/api/businesses',{headers:h});
  if(!bizRes.ok) throw new Error('businesses API failed: '+bizRes.status);
  businesses=await bizRes.json();
  const catRes=await fetch(API+'/api/categories',{headers:h});
  if(!catRes.ok) throw new Error('categories API failed: '+catRes.status);
  categories=await catRes.json();
  if(currentUser&&(currentUser.role==='staff'||currentUser.role==='manager')){document.getElementById('app-screen').style.display='none';document.getElementById('staff-screen').style.display='block';document.getElementById('staff-name').textContent=(currentUser.name||currentUser.username)+' | '+(currentUser.business||'');
var navHtml='';
var btnStyle='padding:.7rem 1rem;border:none;background:none;color:#94a3b8;font-size:.82rem;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap';
var btnStyleOn='padding:.7rem 1rem;border:none;background:none;color:#f59e0b;font-size:.82rem;border-bottom:2px solid #f59e0b;cursor:pointer;white-space:nowrap';
if(currentUser.role==='manager'){
  navHtml+='<button style="'+btnStyleOn+'" onclick="staffTab(this,&quot;home&quot;)">홈 Нүүр</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,&quot;clock&quot;)">출퇴근 Ирц</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,&quot;check&quot;)">체크리스트 Даалгавар</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,&quot;sincome&quot;)">입금 Орлого</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,&quot;sexpense&quot;)">지출 Зарлага</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,&quot;shistory&quot;)">거래내역 Түүх</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,&quot;sexcel&quot;)">엑셀 Excel</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,&quot;sinven&quot;)">재고 Бараа</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,&quot;snotice&quot;)">공지 Мэдэгдэл</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,&quot;sreport&quot;)">보고서 Тайлан</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,&quot;sprofile&quot;)">비밀번호</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,&quot;smgr&quot;)" id="mgr-tab">직원관리 Ажилтан</button>';
  document.getElementById('staff-nav').innerHTML=navHtml;
  staffTab(null,'home');
} else {
  navHtml+='<button style="'+btnStyleOn+'" onclick="staffTab(this,\'clock\')">출퇴근 Ирц</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,\'check\')">체크리스트 Даалгавар</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,&quot;snotice&quot;)">공지</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,&quot;sreport&quot;)">보고서</button>';
  navHtml+='<button style="'+btnStyle+'" onclick="staffTab(this,&quot;sprofile&quot;)">비밀번호</button>';
  document.getElementById('staff-nav').innerHTML=navHtml;
  staffTab(null,'clock');
}
var mt=document.getElementById('mgr-tab');if(mt&&currentUser.role!=='manager'&&currentUser.role!=='admin')mt.style.display='none';return;}
  document.getElementById('app-screen').style.display='block';
  showSection('dashboard');
}

async function apiFetch(url,opts={}){
  opts.headers={...opts.headers,'Authorization':'Bearer '+authToken,'Content-Type':'application/json'};
  return fetch(API+url,opts);
}

let _curSec='dashboard';
function showSection(name,noPush){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const idx=['dashboard','income','expense','history','employees','fixed','tax','reports','excel','notices','inventory','dreports','goals','attendance','checklist','settings'].indexOf(name);
  if(idx>=0)document.querySelectorAll('.nav-item:not(a)')[idx]?.classList.add('active');
  document.querySelector('.sidebar').classList.remove('open');
  if(!noPush&&name!==_curSec)history.pushState({sec:name},'','#'+name);
  _curSec=name;
  if(name==='dashboard')loadDashboard();
  else if(name==='income')openTxForm('income');
  else if(name==='expense')openTxForm('expense');
  else if(name==='history')loadHistory();
  else if(name==='employees')loadEmployees();
  else if(name==='fixed')loadFixedCosts();
  else if(name==='tax')loadTax();
  else if(name==='reports')loadReports();
  else if(name==='excel')loadExcelUpload();
  else if(name==='notices')loadAdminNotices();
  else if(name==='inventory')loadAdminInventory();
  else if(name==='dreports')loadAdminReports();
  else if(name==='goals')loadAdminGoals();
  else if(name==='attendance')loadAdminAttendance();
  else if(name==='checklist')loadAdminChecklist();
  else if(name==='settings')loadSettings();
}

    if(t.type==='income')catMap[k].income+=t.amount;
    else catMap[k].expense+=t.amount;

  const dayMap={};
  txs.forEach(t=>{
    const d=t.transaction_date;

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem">
        <div><div style="font-size:0.7rem;color:var(--text2)">매출</div><div class="tx-income" style="font-size:1rem;font-weight:700">${formatMoney(aIncome)}</div></div>
        <div><div style="font-size:0.7rem;color:var(--text2)">지출</div><div class="tx-expense" style="font-size:1rem;font-weight:700">${formatMoney(aExpense)}</div></div>
        <div><div style="font-size:0.7rem;color:var(--text2)">순수익</div><div style="font-size:1rem;font-weight:700;color:${aIncome-aExpense>=0?'var(--income)':'var(--expense)'}">${formatMoney(aIncome-aExpense)}</div></div>
      </div>
    </div>
    
    <!-- 이번 달 -->
    <div style="background:rgba(255,255,255,0.03);border-radius:12px;padding:1rem;margin-bottom:1rem">
      <div style="font-size:0.75rem;color:var(--text2);margin-bottom:0.5rem;font-weight:600">📅 이번 달 (${ym})</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem">
        <div><div style="font-size:0.7rem;color:var(--text2)">매출</div><div class="tx-income" style="font-size:1rem;font-weight:700">${formatMoney(mIncome)}</div></div>

        <div><div style="font-size:0.7rem;color:var(--text2)">순수익</div><div style="font-size:1rem;font-weight:700;color:${mIncome-mExpense>=0?'var(--income)':'var(--expense)'}">${formatMoney(mIncome-mExpense)}</div></div>

            <div>
              <div style="font-size:0.8rem">${t.description||t.cat_name||'거래'}</div>

// 일별 상세 (날짜 클릭 시)
async function showDayDetail(bizId, bizName, bizIcon, date){
  const txs=await apiFetch('/api/transactions?business_id='+bizId+'&date_from='+date+'&date_to='+date).then(r=>r.json());
  let total=0;
  txs.forEach(t=>{if(t.type==='income')total+=t.amount;else total-=t.amount});
  
  const mc=document.getElementById('modal-container');
  mc.innerHTML=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()" style="max-width:500px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <h3 style="margin:0">${bizIcon} ${date} 상세</h3>
      <button onclick="closeModal()" style="background:none;border:none;color:var(--text2);font-size:1.3rem;cursor:pointer">✕</button>
    </div>
    <div style="background:rgba(255,255,255,0.03);border-radius:12px;overflow:hidden;max-height:400px;overflow-y:auto">
      ${txs.map(t=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:0.7rem 1rem;border-bottom:1px solid rgba(255,255,255,0.05)">
          <div>
            <div style="font-size:0.85rem">${t.description||t.cat_name||'거래'}</div>
            <div style="font-size:0.65rem;color:var(--text2)">${t.cat_name||'미분류'} · ${t.payment_method||''}</div>
          </div>
          <span class="${t.type==='income'?'tx-income':'tx-expense'}" style="font-size:0.95rem;font-weight:700">${t.type==='income'?'+':'-'}${formatMoney(t.amount)}</span>
        </div>`).join('')}
    </div>
    <div style="text-align:right;padding:0.8rem 0;font-weight:700;font-size:1rem;color:${total>=0?'var(--income)':'var(--expense)'}">합계: ${formatMoney(Math.abs(total))}</div>
    <button class="btn" style="width:100%;justify-content:center;background:var(--card2)" onclick="showBizDetail('${bizId}','${bizName}','${bizIcon}','${bizColor||'#3b82f6'}')">← 돌아가기</button>
  </div></div>`;
}

let dashBizFilter='all'; // 'all' or business id
let dashYear='2026'; // year filter
let dashType='all'; // 'all', 'income', 'expense'
async function loadDashboard(){
  const [d, ms, ys] = await Promise.all([
    apiFetch('/api/dashboard').then(r=>r.json()),
    apiFetch('/api/monthly-summary').then(r=>r.json()),
    apiFetch('/api/yearly-summary').then(r=>r.json())
  ]);
  
  // If specific biz selected, also load biz-specific data
  let bizMs = ms;
  let bizYs = ys;
  if(dashBizFilter!=='all'){
    bizMs = await apiFetch('/api/monthly-summary/'+dashBizFilter).then(r=>r.json());
    bizYs = await apiFetch('/api/yearly-summary?business_id='+dashBizFilter).then(r=>r.json());
  }
  
  // Filter months by selected year
  const allYears = [...new Set(bizMs.months.map(m=>m.month.slice(0,4)))].sort();
  if(!allYears.includes(dashYear) && dashYear!=='all') dashYear = allYears[allYears.length-1] || '2026';
  const filteredMonths = dashYear==='all' ? bizMs.months : bizMs.months.filter(m=>m.month.startsWith(dashYear));
  const filteredGrand = {
    income: filteredMonths.reduce((s,m)=>s+m.income,0),
    expense: filteredMonths.reduce((s,m)=>s+m.expense,0),
    profit: filteredMonths.reduce((s,m)=>s+m.income-m.expense,0)
  };
  const showIncome = dashType==='all'||dashType==='income';
  const showExpense = dashType==='all'||dashType==='expense';
  
  const sec=document.getElementById('sec-dashboard');
  
  const monthNames={'01':'1월','02':'2월','03':'3월','04':'4월','05':'5월','06':'6월','07':'7월','08':'8월','09':'9월','10':'10월','11':'11월','12':'12월'};
  const getMonthName=(m)=>m.slice(0,4)+'년 '+monthNames[m.slice(5,7)];
  
  sec.innerHTML=`
    <div class="page-header"><h2>📊 현황판</h2>
      <div class="quick-btns">
        <button class="btn btn-income btn-sm" onclick="showSection('income')"><i class="fas fa-plus"></i> ${t('addIncome')}</button>
        <button class="btn btn-expense btn-sm" onclick="showSection('expense')"><i class="fas fa-minus"></i> ${t('addExpense')}</button>
      </div>
    </div>

    <!-- ===== 사업장 필터 탭 ===== -->
    <div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap">

      ${d.businesses.filter(b=>b.monthIncome||b.monthExpense||dashBizFilter==b.id).concat(d.businesses.filter(b=>!b.monthIncome&&!b.monthExpense&&dashBizFilter!=b.id)).map(b=>{

        return `<button class="btn ${dashBizFilter==b.id?'btn-primary':'btn-sm'}" style="${dashBizFilter==b.id?'':'background:var(--card2);color:var(--text2)'}" onclick="dashBizFilter='${b.id}';loadDashboard()">${b.icon} ${b.name}</button>`

let txCount=0;
let txLines=[];
function addTxLine(){
  const catEl=document.getElementById('tx-cat');
  const amt=Number(g('tx-amount'));
  const desc=g('tx-desc');
  if(!catEl.value||catEl.value==='new')return alert('항목을 선택하세요');
  if(!amt)return alert('금액을 입력하세요');
  txLines.push({category_id:Number(catEl.value),catName:catEl.selectedOptions[0]?.text||'',amount:amt,description:desc});
  document.getElementById('tx-amount').value='';
  document.getElementById('tx-desc').value='';
  renderTxLines();
  document.getElementById('tx-amount').focus();
}
function removeTxLine(i){txLines.splice(i,1);renderTxLines();}
function renderTxLines(){
  const el=document.getElementById('tx-lines');
  const tot=document.getElementById('tx-total');
  if(!txLines.length){el.innerHTML='';tot.style.display='none';return;}
  el.innerHTML=txLines.map((l,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0.6rem;background:var(--bg);border-radius:6px;margin-bottom:3px;font-size:0.85rem">
    <div><strong>${l.catName}</strong> ${l.description?'<span style="color:var(--text2)">'+l.description+'</span>':''}</div>
    <div style="display:flex;align-items:center;gap:0.5rem">
      <strong>${formatMoney(l.amount)}</strong>
      <span onclick="removeTxLine(${i})" style="cursor:pointer;color:var(--danger);font-size:1rem">✕</span>
    </div>
  </div>`).join('');
  const total=txLines.reduce((s,l)=>s+l.amount,0);
  tot.style.display='block';
  tot.innerHTML=`합계: <span style="color:var(--success)">${formatMoney(total)}</span> (${txLines.length}건)`;
}
async function saveTx(type){
  // 입력 중인 항목이 있으면 자동 추가
  if(Number(g('tx-amount'))>0 && g('tx-cat')){addTxLine();}
  
  if(!txLines.length)return alert('항목을 추가해주세요');
  
  const bizId=Number(g('tx-biz'));
  const date=g('tx-date');
  const pay=[...document.querySelectorAll('.tx-pay-cb:checked')].map(c=>c.value).join('+') || 'cash';
  let ok=0,fail=0;
  for(const line of txLines){
    const body={business_id:bizId,category_id:line.category_id,type,amount:line.amount,description:line.description,payment_method:pay,transaction_date:date};
    const res=await apiFetch('/api/transactions',{method:'POST',body:JSON.stringify(body)});
    if(res.ok)ok++;else fail++;
  }
  txCount+=ok;
  const total=txLines.reduce((s,l)=>s+l.amount,0);
  const saved=document.getElementById('tx-saved');
  if(saved){
    saved.style.display='block';
    saved.innerHTML=`✅ <strong>${ok}건 ${formatMoney(total)}</strong> 저장 완료! (총 ${txCount}건)${fail?` ❌ ${fail}건 실패`:''}`;
  }
  txLines=[];
  renderTxLines();
  document.getElementById('tx-amount').focus();
}

async function editTxModal(id){
  const res=await apiFetch('/api/transactions/'+id);
  if(!res.ok)return alert('거래를 찾을 수 없습니다');
  const tx=await res.json();
  const cats=categories.filter(c=>c.business_id===tx.business_id && c.type===tx.type);
  const pays=['cash','card','qpay','transfer'];
  const payLabels={'cash':'💵 현금','card':'💳 카드','qpay':'📱 QPay','transfer':'🏦 이체'};
  const curPays=(tx.payment_method||'cash').split('+');

async function saveEditTx(id){
  const pay=[...document.querySelectorAll('.etx-pay:checked')].map(c=>c.value).join('+')||'cash';
  const body={
    category_id:Number(document.getElementById('etx-cat').value),
    amount:Number(document.getElementById('etx-amt').value),
    description:document.getElementById('etx-desc').value,
    transaction_date:document.getElementById('etx-date').value,
    payment_method:pay
  };
  if(!body.amount)return alert('금액을 입력하세요');
  const res=await apiFetch('/api/transactions/'+id,{method:'PUT',body:JSON.stringify(body)});
  if(!res.ok){const d=await res.json();return alert(d.error||'수정 실패');}
  closeModal();loadDashboard();
}
async function deleteTx(id){
  if(!confirm('거래 #'+id+'을(를) 삭제하시겠습니까?'))return;
  await apiFetch('/api/transactions/'+id,{method:'DELETE'});
  loadDashboard();
}

async function filterHistory(){
  const params=new URLSearchParams();
  if(g('h-biz'))params.set('business_id',g('h-biz'));
  if(g('h-type'))params.set('type',g('h-type'));
  if(g('h-from'))params.set('date_from',g('h-from'));
  if(g('h-to'))params.set('date_to',g('h-to'));
  const txs=await apiFetch('/api/transactions?'+params).then(r=>r.json());
  const totalIn=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalOut=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('h-tbody').innerHTML=txs.map(tx=>`<tr>
    <td>${tx.transaction_date}</td><td>${tx.biz_icon}${tx.biz_name}</td>
    <td>${tx.type==='income'?`<span style="color:var(--income)">${t('income')}</span>`:`<span style="color:var(--expense)">${t('expense')}</span>`}</td>
    <td>${tx.cat_name||'-'}</td><td>${tx.description||'-'}</td>
    <td class="tx-${tx.type}">${tx.type==='income'?'+':'−'}${formatMoney(tx.amount)}</td>
    <td style="font-size:0.8rem">${tx.payment_method}</td>
    <td><button class="btn btn-sm btn-danger" onclick="deleteTx(${tx.id})"><i class="fas fa-trash"></i></button></td>
  </tr>`).join('');
  document.getElementById('h-summary').innerHTML=`
    <div style="display:flex;gap:2rem;justify-content:flex-end;font-size:0.9rem">
      <span>${t('income')}: <strong class="tx-income">${formatMoney(totalIn)}</strong></span>
      <span>${t('expense')}: <strong class="tx-expense">${formatMoney(totalOut)}</strong></span>
      <span>${t('profit')}: <strong style="color:${totalIn-totalOut>=0?'var(--income)':'var(--expense)'}">${formatMoney(totalIn-totalOut)}</strong></span>
    </div>`;
}

async function deleteTx(id){if(!confirm(t('deleteConfirm')))return;await apiFetch('/api/transactions/'+id,{method:'DELETE'});filterHistory()}

function handleExcelDrop(e){
  e.preventDefault();
  document.getElementById('excel-dropzone').style.background='rgba(139,92,246,0.05)';
  const files = Array.from(e.dataTransfer.files).filter(f=>f.name.match(/\.(xlsx|xls)$/i));
  if(files.length===0)return alert('엑셀 파일(.xlsx)만 지원합니다.');
  uploadExcelFiles(files);
}

function handleExcelFileSelect(input){
  const files = Array.from(input.files);
  if(files.length===0)return;
  uploadExcelFiles(files);
  input.value='';
}

var _excelFileCache = {};

async function uploadExcelFiles(files){
  const resultDiv = document.getElementById('excel-result');
  resultDiv.innerHTML = `<div style="text-align:center;padding:1rem"><span class="spinner"></span> 처리 중... (${files.length}개)</div>`;

  const results = [];
  for(const file of files){
    _excelFileCache[file.name] = file;
    const fd = new FormData();
    fd.append('file', file);
    try{
      const r = await fetch(API+'/api/excel-import', {
        method:'POST',
        headers:{ Authorization:'Bearer '+authToken },
        body:fd
      });
      const data = await r.json();
      results.push({ file: file.name, ok: r.ok, ...data });
    }catch(e){
      results.push({ file: file.name, ok:false, error: e.message });
    }
  }

  resultDiv.innerHTML = renderExcelResults(results);
  loadExcelHistory();
}

              const parts=[];

              return `<div style="font-size:0.78rem;color:var(--text2);margin-top:0.15rem">• ${v.date}: ${parts.join(' / ')}</div>`;
            }).join('')}
          `}
        </div>`;
      }
      html += `<div style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:12px;padding:1rem;margin-bottom:0.75rem">

      html += `<div style="background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:12px;padding:1rem;margin-bottom:0.75rem">
        <div style="font-weight:600;color:#f59e0b;margin-bottom:0.3rem">🏢 ${r.file} — 사업장 선택 필요</div>

        <div style="display:flex;gap:0.4rem;margin-top:0.6rem;flex-wrap:wrap">

    } else if(r.conflicts){
      const fname = r.file.replace(/'/g,"\\'");
      html += `<div style="background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:12px;padding:1rem;margin-bottom:0.75rem">

async function forceUploadExcel(filename, btn){
  const file = _excelFileCache[filename];
  if(!file){ alert('파일을 다시 선택해 주세요.'); return; }
  if(btn){ btn.disabled = true; btn.textContent = '처리 중...'; }
  const fd = new FormData();
  fd.append('file', file);
  fd.append('force', 'true');
  try{
    const r = await fetch(API+'/api/excel-import', {
      method:'POST',
      headers:{ Authorization:'Bearer '+authToken },
      body:fd
    });
    const data = await r.json();

async function uploadExcelWithBusiness(filename, businessId, btn){
  const file = _excelFileCache[filename];
  if(!file){ alert('파일을 다시 선택해 주세요.'); return; }
  if(btn){ btn.disabled = true; btn.textContent = '처리 중...'; }
  const fd = new FormData();
  fd.append('file', file);
  fd.append('business_id', String(businessId));
  fd.append('force', 'true');
  try{
    const r = await fetch(API+'/api/excel-import', {
      method:'POST',
      headers:{ Authorization:'Bearer '+authToken },
      body:fd
    });
    const data = await r.json();
    const result = { file: filename, ok: r.ok, ...data };
    const card = btn ? btn.closest('div[style*="border-radius:12px"]') : null;
    if(card){ card.outerHTML = renderExcelResults([result]); }
    loadExcelHistory();
  }catch(e){
    alert('업로드 실패: ' + e.message);
    if(btn){ btn.disabled = false; }
  }
}

async function loadExcelHistory(){
  const div = document.getElementById('excel-history');
  if(!div) return;
  try{
    const r = await apiFetch('/api/transactions?limit=20');
    const txs = await r.json();
    // Filter auto-imported ones (description contains '매출' and is recent)
    const recent = txs.slice(0,15);
    if(recent.length===0){ div.innerHTML='<div style="color:var(--text2)">데이터 없음</div>'; return; }
    div.innerHTML = recent.map(t=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:0.9rem;font-weight:500">${t.description||'-'}</div>
          <div style="font-size:0.75rem;color:var(--text2)">${t.transaction_date} · ${t.biz_name||''}</div>

    `).join('');
  }catch(e){

  }
}

var _staffExcelFile=null;

async function uploadStaffExcel(input,force){
  var file = force ? _staffExcelFile : (input.files && input.files[0]);
  if(!file)return;
  if(!force) _staffExcelFile = file;
  var fd=new FormData();fd.append('file',file);
  if(force) fd.append('force','true');
  document.getElementById('sex_result').innerHTML='<p style="text-align:center;color:var(--text2)">처리 중...</p>';
  try{
    var r=await fetch(API+'/api/excel-import',{method:'POST',headers:{Authorization:'Bearer '+authToken},body:fd});
    var d=await r.json();
    if(d.ok){
      var h='<div style="background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:.8rem"><div style="color:var(--income);font-weight:700;margin-bottom:.3rem">입력 완료!</div><div style="font-size:.85rem">'+d.message+'</div>';
      if(d.entries)d.entries.forEach(function(e){h+='<div style="font-size:.8rem;margin-top:.2rem">'+e.description+': <strong>'+formatMoney(e.amount)+'</strong></div>'});

async function filterAdminAtt(){

async function filterAdminCL(){
  var date=document.getElementById('cl-date')?.value||'';

  var cat=document.getElementById('cl-cat')?.value||'';
  var view=document.getElementById('cl-view')?.value||'cat';
  try{
    var r=await apiFetch('/api/checklist?date='+date+(biz?'&business='+biz:''));
    var items=await r.json();
    if(cat)items=items.filter(function(i){return (i.category||'기타')===cat});
    var total=items.length;var done=items.filter(function(c){return c.is_done}).length;var pct=total?Math.round(done/total*100):0;
    document.getElementById('cl-progress').innerHTML='<div style="display:flex;justify-content:space-between;font-size:.82rem;color:var(--text2)"><span>'+done+'/'+total+' 완료</span><span>'+pct+'%</span></div><div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:4px"><div style="height:100%;background:var(--primary);width:'+pct+'%;border-radius:4px"></div></div>';

    var h='';

      var byCat={};items.forEach(function(i){var k=i.category||'기타';if(!byCat[k])byCat[k]=[];byCat[k].push(i)});
      CL_CATS.forEach(function(c){
        if(!byCat[c])return;
        var list=byCat[c];var d2=list.filter(function(x){return x.is_done}).length;
        var color=clCatColor(c);
        h+='<div style="margin-bottom:1rem;border-left:4px solid '+color+';padding-left:.7rem">';
        h+='<div style="font-size:.95rem;font-weight:700;margin-bottom:.4rem;color:'+color+'">'+CL_CAT_EMOJI[c]+' '+c+' <span style="font-size:.75rem;color:var(--text2);font-weight:400">'+d2+'/'+list.length+'</span></div>';
        list.forEach(function(i){
          h+='<div style="display:flex;align-items:center;gap:.5rem;padding:.5rem;background:var(--bg);border-radius:6px;margin-bottom:.25rem;opacity:'+(i.is_done?'.5':'1')+'">';
          h+='<span style="color:'+(i.is_done?'var(--income)':'var(--text2)')+';font-weight:700">'+(i.is_done?'✓':'○')+'</span>';
          h+='<span style="flex:1;font-size:.85rem;'+(i.is_done?'text-decoration:line-through':'')+'">'+i.title+'</span>';
          h+='<span style="font-size:.7rem;color:var(--text2);background:var(--bg2);padding:2px 6px;border-radius:4px">'+(i.username||'미배정')+'</span>';
          if(i.business)h+='<span style="font-size:.7rem;color:var(--text2)">'+i.business+'</span>';
          if(i.done_at)h+='<span style="font-size:.7rem;color:var(--text2)">'+i.done_at.slice(11,16)+'</span>';
          h+='<button class="btn" style="background:var(--expense);color:#fff;padding:2px 8px;font-size:.7rem;margin-left:.3rem" onclick="adminDelCL('+i.id+')">삭제</button>';
          h+='</div>';
        });
        h+='</div>';
      });
    } else {
      // 직원별 그룹화 (기존 보기)
      var byStaff={};items.forEach(function(i){var k=i.username||'미배정';if(!byStaff[k])byStaff[k]=[];byStaff[k].push(i)});
      Object.keys(byStaff).forEach(function(name){
        var list=byStaff[name];var d2=list.filter(function(c){return c.is_done}).length;
        h+='<div style="margin-bottom:.8rem"><div style="font-size:.9rem;font-weight:700;margin-bottom:.3rem">'+name+' <span style="font-size:.75rem;color:var(--text2)">'+d2+'/'+list.length+'</span></div>';
        var byC={};list.forEach(function(i){var k=i.category||'기타';if(!byC[k])byC[k]=[];byC[k].push(i)});
        CL_CATS.forEach(function(c){
          if(!byC[c])return;
          var color=clCatColor(c);
          h+='<div style="font-size:.75rem;color:'+color+';font-weight:700;margin:.4rem 0 .2rem">'+CL_CAT_EMOJI[c]+' '+c+'</div>';
          byC[c].forEach(function(i){
            h+='<div style="display:flex;align-items:center;gap:.5rem;padding:.4rem;background:var(--bg);border-radius:6px;margin-bottom:.2rem;opacity:'+(i.is_done?'.5':'1')+'">';
            h+='<span style="color:'+(i.is_done?'var(--income)':'var(--text2)')+'">'+(i.is_done?'✓':'○')+'</span>';
            h+='<span style="flex:1;font-size:.82rem;'+(i.is_done?'text-decoration:line-through':'')+'">'+i.title+'</span>';
            if(i.done_at)h+='<span style="font-size:.7rem;color:var(--text2)">'+i.done_at.slice(11,16)+'</span>';
            h+='<button class="btn" style="background:var(--expense);color:#fff;padding:2px 8px;font-size:.7rem" onclick="adminDelCL('+i.id+')">삭제</button>';
            h+='</div>';
          });
        });
        h+='</div>';
      });
    }
    document.getElementById('cl-body').innerHTML=h||'<p style="color:var(--text2);text-align:center;padding:2rem">체크리스트 없음</p>';
  }catch(e){document.getElementById('cl-body').innerHTML='<p style="color:var(--expense)">오류</p>'}
}

async function staffDelInv(id,name){if(!confirm('"'+name+'" 품목을 삭제할까요?\nҮүнийг устгах уу?'))return;try{var r=await apiFetch('/api/inventory/'+id,{method:'DELETE'});if(!r.ok){var e=await r.json();return alert(e.error||'삭제 실패')}staffInventory()}catch(e){alert('오류')}}
async function addInventory(){
  var n=document.getElementById('inv-n');var cat=document.getElementById('inv-c');var s=document.getElementById('inv-s');var p=document.getElementById('inv-p');var sup=document.getElementById('inv-sup2');
  if(!n||!n.value.trim())return alert('품목명을 입력하세요');
  try{
    await apiFetch('/api/inventory',{method:'POST',body:JSON.stringify({
      name:n.value.trim(),business:currentUser.business||'',
      category:cat?cat.value:'',stock:s?parseInt(s.value)||0:0,
      min_stock:5,unit:'ea',unit_price:p?+p.value||0:0,

    })});

  }catch(e){alert('오류')}
}

      var color=i.stock<=i.min_stock?'var(--expense)':i.stock<=i.min_stock*2?'var(--primary)':'var(--income)';

var _notifTimer = null;
var _lastNoticeId = 0;
var _lastReportId = 0;
function _seenKey(type){ return 'fin_seen_'+type+'_'+(currentUser&&currentUser.id||0); }

function playBeep(){
  try{
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    var actx = new Ctx();
    function tone(freq, start, dur){
      var osc = actx.createOscillator(), gain = actx.createGain();
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.001, actx.currentTime+start);
      gain.gain.exponentialRampToValueAtTime(0.18, actx.currentTime+start+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+start+dur);
      osc.connect(gain); gain.connect(actx.destination);
      osc.start(actx.currentTime+start); osc.stop(actx.currentTime+start+dur+0.05);
    }
    tone(880, 0, 0.18);
    tone(1175, 0.18, 0.22);
  }catch(e){}
}

function showToast(emoji, title, msg, onClick){
  var c = document.getElementById('toast-stack');
  if(!c){
    c = document.createElement('div');
    c.id='toast-stack';
    c.style.cssText='position:fixed;top:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;max-width:340px;pointer-events:none';
    document.body.appendChild(c);
  }
  var t = document.createElement('div');
  t.style.cssText='pointer-events:auto;background:#1e293b;border:1px solid #f59e0b;border-left:5px solid #f59e0b;border-radius:10px;padding:.85rem 1rem;color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.5);cursor:pointer;transform:translateX(0);transition:opacity .3s,transform .3s';
  t.innerHTML = '<div style="font-weight:700;color:#f59e0b;margin-bottom:.25rem">'+emoji+' '+title+'</div><div style="font-size:.85rem;color:#cbd5e1;line-height:1.35">'+msg+'</div>';
  if(onClick) t.addEventListener('click', function(){ try{onClick()}catch(e){} t.remove(); });
  c.appendChild(t);
  setTimeout(function(){
    t.style.opacity='0'; t.style.transform='translateX(20px)';
    setTimeout(function(){ try{t.remove()}catch(e){} }, 320);
  }, 8000);
}

function setNavBadge(selector, has){

function reportNavSelector(){ return '.nav-item[onclick*="dreports"]'; }

function markNoticesSeen(){
  if(!currentUser) return;
  if(_lastNoticeId) localStorage.setItem(_seenKey('notice'), String(_lastNoticeId));
  setNavBadge(noticeNavSelector(), false);
}
function markReportsSeen(){
  if(!currentUser) return;
  if(_lastReportId) localStorage.setItem(_seenKey('report'), String(_lastReportId));
  setNavBadge(reportNavSelector(), false);
}

async function pollNotifications(initial){
  if(!authToken || !currentUser) return;
  var H = {Authorization:'Bearer '+authToken};
  try{
    var nRes = await fetch(API+'/api/notices', {headers:H});
    if(nRes.ok){
      var notices = await nRes.json();
      var maxId = notices.length ? Math.max.apply(null, notices.map(function(n){return n.id})) : 0;
      var seen = parseInt(localStorage.getItem(_seenKey('notice'))||'0', 10);
      if(initial){
        if(!seen) localStorage.setItem(_seenKey('notice'), String(maxId));
      } else if(maxId > Math.max(seen, _lastNoticeId)){
        var threshold = Math.max(seen, _lastNoticeId);
        var fresh = notices.filter(function(n){return n.id > threshold}).reverse();
        fresh.forEach(function(n){
          playBeep();
          var snippet = (n.content||'').replace(/\s+/g,' ').slice(0,60);
          showToast('📢', '새 공지: '+(n.title||''), snippet, function(){
            if(currentUser.role==='admin') showSection('notices');
            else staffTab(null,'snotice');
          });
        });
        setNavBadge(noticeNavSelector(), true);
      }
      _lastNoticeId = maxId;
    }
  }catch(e){}

  // 사장만 직원 보고서 알림
  if(currentUser.role==='admin'){
    try{
      var rRes = await fetch(API+'/api/daily-reports', {headers:H});
      if(rRes.ok){
        var reports = await rRes.json();
        var maxId = reports.length ? Math.max.apply(null, reports.map(function(r){return r.id})) : 0;
        var seen = parseInt(localStorage.getItem(_seenKey('report'))||'0', 10);
        if(initial){
          if(!seen) localStorage.setItem(_seenKey('report'), String(maxId));
        } else if(maxId > Math.max(seen, _lastReportId)){
          var threshold = Math.max(seen, _lastReportId);
          var fresh = reports.filter(function(r){return r.id > threshold}).reverse();
          fresh.forEach(function(r){
            playBeep();
            var snippet = (r.content||'').replace(/\s+/g,' ').slice(0,60);
            showToast('📝', '새 보고서 ('+(r.username||'직원')+')', snippet, function(){ showSection('dreports'); });
          });
          setNavBadge(reportNavSelector(), true);
        }
        _lastReportId = maxId;
      }
    }catch(e){}
  }
}

function startNotifPolling(){
  if(_notifTimer) clearInterval(_notifTimer);
  pollNotifications(true);
  _notifTimer = setInterval(function(){ pollNotifications(false) }, 25000);
}

// initApp 끝나면 폴링 시작 (initApp이 즉시 실행 안 끝나도 안전하게 추가)
(function(){
  var origInit = initApp;
  initApp = async function(){
    var r = await origInit.apply(this, arguments);
    try{ startNotifPolling() }catch(e){}
    return r;
  };
})();

(function(){

  showSection = function(name, noPush){
    var r = origShow.apply(this, arguments);
    if(name==='notices') markNoticesSeen();
    if(name==='dreports') markReportsSeen();

    staffTab = function(el, id){
      var r = origTab.apply(this, arguments);
      if(id==='snotice') markNoticesSeen();
      return r;
    };
  }
})();

var a=d.attendance||{};var cl=d.checklist||[];
var done=cl.filter(function(c){return c.is_done}).length;
var pct=cl.length?Math.round(done/cl.length*100):0;
var bizId=getMyBizId();
var today=new Date().toISOString().slice(0,10);
var monthStart=today.slice(0,7)+'-01';

var r2=await apiFetch('/api/transactions?business_id='+bizId+'&date_from='+monthStart+'&date_to='+today);
var txs=await r2.json();
var mIncome=0,mExpense=0;
txs.forEach(function(t){if(t.type==='income')mIncome+=t.amount;else mExpense+=t.amount});

var todayInc=0,todayExp=0;
txs.filter(function(t){return t.transaction_date===today}).forEach(function(t){if(t.type==='income')todayInc+=t.amount;else todayExp+=t.amount});

var dailyMap={};
txs.forEach(function(t){
  var day=t.transaction_date.slice(8,10);
  if(!dailyMap[day])dailyMap[day]={income:0,expense:0};
  dailyMap[day][t.type]+=t.amount;
});
var days=Object.keys(dailyMap).sort();
var maxVal=1;days.forEach(function(d){var v=Math.max(dailyMap[d].income,dailyMap[d].expense);if(v>maxVal)maxVal=v});

var h='<div style="font-size:1.1rem;font-weight:700;color:var(--primary);margin-bottom:.8rem">'+getMyBizName()+' 대시보드 Хянах самбар</div>';

h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.8rem">';
h+='<div style="background:rgba(34,197,94,.1);border-radius:10px;padding:.8rem;text-align:center;border:1px solid rgba(34,197,94,.2)"><div style="font-size:.7rem;color:var(--text2)">오늘 수입 Өнөөдрийн орлого</div><div style="font-size:1.2rem;font-weight:800;color:var(--income)">'+formatMoney(todayInc)+'</div></div>';
h+='<div style="background:rgba(239,68,68,.1);border-radius:10px;padding:.8rem;text-align:center;border:1px solid rgba(239,68,68,.2)"><div style="font-size:.7rem;color:var(--text2)">오늘 지출 Өнөөдрийн зарлага</div><div style="font-size:1.2rem;font-weight:800;color:var(--expense)">'+formatMoney(todayExp)+'</div></div>';
h+='</div>';

h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:.8rem">';
h+='<div style="background:rgba(34,197,94,.1);border-radius:10px;padding:.6rem;text-align:center"><div style="font-size:.65rem;color:var(--text2)">이번달 수입 Энэ сарын орлого</div><div style="font-size:1rem;font-weight:700;color:var(--income)">'+formatMoney(mIncome)+'</div></div>';
h+='<div style="background:rgba(239,68,68,.1);border-radius:10px;padding:.6rem;text-align:center"><div style="font-size:.65rem;color:var(--text2)">이번달 지출 Энэ сарын зарлага</div><div style="font-size:1rem;font-weight:700;color:var(--expense)">'+formatMoney(mExpense)+'</div></div>';
h+='<div style="background:rgba(139,92,246,.1);border-radius:10px;padding:.6rem;text-align:center"><div style="font-size:.65rem;color:var(--text2)">순이익</div><div style="font-size:1rem;font-weight:700;color:var(--primary)">'+formatMoney(mIncome-mExpense)+'</div></div>';
h+='</div>';

h+='<div style="background:var(--bg2);border-radius:12px;padding:1rem;margin-bottom:.8rem;border:1px solid var(--border)">';
h+='<div style="font-size:.82rem;color:var(--text2);margin-bottom:.8rem">일별 매출 그래프 Өдөр тутмын борлуулалт</div>';
h+='<div style="display:flex;align-items:flex-end;gap:3px;height:120px;overflow-x:auto">';
days.forEach(function(day){
  var inc=dailyMap[day].income;var exp=dailyMap[day].expense;
  var ih=Math.max(Math.round(inc/maxVal*100),2);
  var eh=exp?Math.max(Math.round(exp/maxVal*100),2):0;
  h+='<div style="display:flex;flex-direction:column;align-items:center;min-width:20px;flex:1">';
  h+='<div style="display:flex;gap:1px;align-items:flex-end;height:100px">';
  h+='<div style="width:8px;background:linear-gradient(180deg,#22c55e,#16a34a);border-radius:2px 2px 0 0;height:'+ih+'px"></div>';
  if(exp)h+='<div style="width:8px;background:linear-gradient(180deg,#ef4444,#dc2626);border-radius:2px 2px 0 0;height:'+eh+'px"></div>';
  h+='</div>';
  h+='<div style="font-size:.6rem;color:var(--text2);margin-top:2px">'+parseInt(day)+'</div>';
  h+='</div>';
});
h+='</div>';
h+='<div style="display:flex;gap:1rem;justify-content:center;margin-top:.5rem;font-size:.7rem">';
h+='<span><span style="display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:2px;margin-right:3px"></span>수입 Орлого</span>';
h+='<span><span style="display:inline-block;width:8px;height:8px;background:#ef4444;border-radius:2px;margin-right:3px"></span>지출 Зарлага</span>';
h+='</div></div>';

// 월별 그래프 - 전체 데이터 (LIMIT 없음)
var r3=await apiFetch('/api/monthly-by-biz?business_id='+bizId);
var monthlyData=await r3.json();
var monthMap={};
monthlyData.forEach(function(d){
  if(!monthMap[d.month])monthMap[d.month]={income:0,expense:0};
  monthMap[d.month][d.type]+=d.total;
});
var months=Object.keys(monthMap).sort().slice(-6);
var maxMonth=1;months.forEach(function(m){var v=Math.max(monthMap[m].income,monthMap[m].expense);if(v>maxMonth)maxMonth=v});
var monthNames={'01':'1월','02':'2월','03':'3월','04':'4월','05':'5월','06':'6월','07':'7월','08':'8월','09':'9월','10':'10월','11':'11월','12':'12월'};

h+='<div style="background:var(--bg2);border-radius:12px;padding:1rem;margin-bottom:.8rem;border:1px solid var(--border)">';
h+='<div style="font-size:.82rem;color:var(--text2);margin-bottom:.8rem">월별 매출 추이 Сар бүрийн борлуулалт</div>';
h+='<div style="display:flex;align-items:flex-end;gap:8px;height:140px">';
months.forEach(function(m){
  var inc=monthMap[m].income;var exp=monthMap[m].expense;
  var ih=Math.max(Math.round(inc/maxMonth*110),3);
  var eh=exp?Math.max(Math.round(exp/maxMonth*110),3):0;
  h+='<div style="display:flex;flex-direction:column;align-items:center;flex:1">';
  h+='<div style="font-size:.6rem;color:var(--income);font-weight:700;margin-bottom:2px">'+formatMoney(inc)+'</div>';
  h+='<div style="display:flex;gap:2px;align-items:flex-end;height:110px">';
  h+='<div style="width:14px;background:linear-gradient(180deg,#22c55e,#16a34a);border-radius:3px 3px 0 0;height:'+ih+'px"></div>';
  if(exp)h+='<div style="width:14px;background:linear-gradient(180deg,#ef4444,#dc2626);border-radius:3px 3px 0 0;height:'+eh+'px"></div>';
  h+='</div>';
  h+='<div style="font-size:.7rem;color:var(--text2);margin-top:3px;font-weight:600">'+(monthNames[m.slice(5,7)]||m)+'</div>';
  h+='</div>';
});
h+='</div>';
h+='<div style="display:flex;gap:1rem;justify-content:center;margin-top:.5rem;font-size:.7rem">';
h+='<span><span style="display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:2px;margin-right:3px"></span>수입 Орлого</span>';
h+='<span><span style="display:inline-block;width:8px;height:8px;background:#ef4444;border-radius:2px;margin-right:3px"></span>지출 Зарлага</span>';
h+='</div></div>';

h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
h+='<div style="background:var(--bg2);border-radius:12px;padding:.8rem;border:1px solid var(--border)"><div style="font-size:.82rem;color:var(--text2);margin-bottom:.4rem">출퇴근</div>';
h+='<div style="font-size:.95rem;font-weight:700">출근: '+(a.clock_in?a.clock_in.slice(11,16):'<span style="color:var(--text2)">아직</span>')+'</div>';
h+='<div style="font-size:.95rem;font-weight:700">퇴근: '+(a.clock_out?a.clock_out.slice(11,16):'<span style="color:var(--text2)">-</span>')+'</div></div>';

h+='<div style="background:var(--bg2);border-radius:12px;padding:.8rem;border:1px solid var(--border)"><div style="font-size:.82rem;color:var(--text2);margin-bottom:.4rem">체크리스트 '+done+'/'+cl.length+'</div>';
h+='<div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:.5rem"><div style="height:100%;background:var(--primary);width:'+pct+'%;border-radius:3px"></div></div>';
cl.slice(0,3).forEach(function(c){h+='<div style="font-size:.75rem;opacity:'+(c.is_done?'.5':'1')+';'+(c.is_done?'text-decoration:line-through':'')+';margin-bottom:2px">'+(c.is_done?'V ':'- ')+c.title+'</div>'});
if(cl.length>3)h+='<div style="font-size:.7rem;color:var(--text2)">...외 '+(cl.length-3)+'개</div>';
h+='</div></div>';

document.getElementById('staff-content').innerHTML=h;
}catch(e){document.getElementById('staff-content').innerHTML='<p style="color:var(--expense)">'+e.message+'</p>'}}
async function staffClock(){var h='<div style="text-align:center;background:var(--bg2);border-radius:12px;padding:1.5rem;border:1px solid var(--border)"><div id="sclk" style="font-size:2rem;font-weight:700;color:var(--primary)">--:--:--</div><div id="sdt" style="color:var(--text2);font-size:.85rem;margin:.5rem 0 1rem"></div><div id="sstat" style="margin-bottom:1rem"></div><div style="display:flex;gap:.5rem;justify-content:center"><button class="btn" id="sbi" style="background:var(--income);color:#fff;padding:.8rem 2rem" onclick="sClockIn()">출근 Ирсэн</button><button class="btn" id="sbo" style="background:var(--expense);color:#fff;padding:.8rem 2rem" onclick="sClockOut()" disabled>퇴근 Явсан</button></div></div><div style="background:var(--bg2);border-radius:12px;padding:1rem;margin-top:1rem;border:1px solid var(--border)"><div style="font-size:.85rem;color:var(--text2);margin-bottom:.5rem">이번달 기록 Энэ сарын бүртгэл</div><table style="width:100%;border-collapse:collapse;font-size:.82rem"><thead><tr><th style="text-align:left;padding:.4rem;color:var(--text2)">날짜</th><th style="text-align:left;padding:.4rem;color:var(--text2)">출근</th><th style="text-align:left;padding:.4rem;color:var(--text2)">퇴근</th></tr></thead><tbody id="satbl"></tbody></table></div>';document.getElementById('staff-content').innerHTML=h;function tick(){var n=new Date();var el=document.getElementById('sclk');if(el)el.textContent=n.toTimeString().slice(0,8);var dl=document.getElementById('sdt');if(dl)dl.textContent=n.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}tick();if(window._sclk)clearInterval(window._sclk);window._sclk=setInterval(tick,1000);try{var r=await apiFetch('/api/attendance/today');var d=await r.json();var bi=document.getElementById('sbi'),bo=document.getElementById('sbo'),st=document.getElementById('sstat');if(d&&d.clock_in&&!d.clock_out){bi.disabled=true;bo.disabled=false;st.innerHTML='<span style="background:rgba(34,197,94,.2);color:var(--income);padding:.3rem .8rem;border-radius:10px;font-size:.85rem">근무중 Ажиллаж байна '+d.clock_in.slice(11,16)+'</span>'}else if(d&&d.clock_out){bi.disabled=true;bo.disabled=true;st.innerHTML='<span style="background:rgba(59,130,246,.2);color:#3b82f6;padding:.3rem .8rem;border-radius:10px;font-size:.85rem">퇴근 '+d.clock_out.slice(11,16)+'</span>'}else{bi.disabled=false;bo.disabled=true;st.innerHTML='<span style="background:rgba(239,68,68,.2);color:var(--expense);padding:.3rem .8rem;border-radius:10px;font-size:.85rem">출근 전 Ирээгүй</span>'}}catch(e){}var today=new Date().toISOString().slice(0,10);try{var r2=await apiFetch('/api/attendance?from='+today.slice(0,7)+'-01&to='+today);var recs=await r2.json();var tb=document.getElementById('satbl');if(tb)tb.innerHTML=recs.map(function(a){return'<tr><td style="padding:.4rem">'+a.date+'</td><td style="padding:.4rem">'+(a.clock_in?a.clock_in.slice(11,16):'-')+'</td><td style="padding:.4rem">'+(a.clock_out?a.clock_out.slice(11,16):'-')+'</td></tr>'}).join('')||'<tr><td colspan="3" style="text-align:center;color:var(--text2);padding:.5rem">없음</td></tr>'}catch(e){}}
async function sClockIn(){try{await apiFetch('/api/attendance/in',{method:'POST'});staffClock()}catch(e){alert('오류')}}
async function sClockOut(){try{await apiFetch('/api/attendance/out',{method:'POST'});staffClock()}catch(e){alert('오류')}}




</script>
</body>
</html>
