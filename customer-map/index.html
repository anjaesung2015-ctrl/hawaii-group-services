<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; font-family: -apple-system, sans-serif; }
.map-container {
  width: 1200px; height: 900px; margin: 0 auto;
  background: linear-gradient(135deg, #0f172a 0%, #1a1a2e 50%, #16213e 100%);
  position: relative; overflow: hidden;
  border-radius: 20px; border: 2px solid rgba(139,92,246,0.3);
}

/* Header */
.header {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 30px 40px 20px;
  background: linear-gradient(180deg, rgba(15,23,42,0.95) 0%, transparent 100%);
  z-index: 10;
}
.header h1 {
  font-size: 32px; font-weight: 900; color: #f1f5f9;
  letter-spacing: -0.5px;
}
.header h1 span { color: #8b5cf6; }
.header p { color: #64748b; font-size: 14px; margin-top: 4px; }

/* Map area - simplified UB roads */
.map-area {
  position: absolute; top: 100px; left: 40px; right: 40px; bottom: 120px;
}

/* Road lines */
.road {
  position: absolute; background: rgba(100,116,139,0.15);
  border-radius: 4px;
}
.road-h { height: 3px; }
.road-v { width: 3px; }
.road-main { background: rgba(100,116,139,0.25); }

/* Districts */
.district {
  position: absolute; font-size: 11px; color: rgba(148,163,184,0.5);
  font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
}

/* Pin */
.pin {
  position: absolute; transform: translate(-50%, -100%);
  cursor: pointer; z-index: 5;
  animation: dropIn 0.5s ease-out both;
}
.pin:nth-child(1) { animation-delay: 0.1s; }
.pin:nth-child(2) { animation-delay: 0.2s; }
.pin:nth-child(3) { animation-delay: 0.3s; }
.pin:nth-child(4) { animation-delay: 0.4s; }
.pin:nth-child(5) { animation-delay: 0.5s; }
.pin:nth-child(6) { animation-delay: 0.6s; }
.pin:nth-child(7) { animation-delay: 0.7s; }
.pin:nth-child(8) { animation-delay: 0.8s; }
.pin:nth-child(9) { animation-delay: 0.9s; }
.pin:nth-child(10) { animation-delay: 1.0s; }

@keyframes dropIn {
  from { opacity: 0; transform: translate(-50%, -200%); }
  to { opacity: 1; transform: translate(-50%, -100%); }
}

.pin-marker {
  width: 36px; height: 36px; border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  position: relative;
}
.pin-marker::after {
  content: ''; position: absolute; bottom: -8px; left: 50%;
  transform: translateX(-50%);
  width: 12px; height: 4px; background: rgba(0,0,0,0.3);
  border-radius: 50%; filter: blur(2px);
}
.pin-icon {
  transform: rotate(45deg); font-size: 16px;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
}
.pin-label {
  position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
  background: rgba(15,23,42,0.9); color: #f1f5f9;
  padding: 4px 10px; border-radius: 8px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
  border: 1px solid rgba(139,92,246,0.3);
  backdrop-filter: blur(4px);
}

/* Center pin (Hawaii) */
.pin-center .pin-marker {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, #8b5cf6, #6d28d9);
  box-shadow: 0 0 30px rgba(139,92,246,0.5);
}
.pin-center .pin-icon { font-size: 24px; }
.pin-center .pin-label {
  background: linear-gradient(135deg, #8b5cf6, #6d28d9);
  font-size: 13px; padding: 6px 14px;
  border: none;
}

/* Category colors */
.cat-food .pin-marker { background: linear-gradient(135deg, #ef4444, #dc2626); }
.cat-shop .pin-marker { background: linear-gradient(135deg, #3b82f6, #2563eb); }
.cat-service .pin-marker { background: linear-gradient(135deg, #22c55e, #16a34a); }
.cat-office .pin-marker { background: linear-gradient(135deg, #f59e0b, #d97706); }
.cat-health .pin-marker { background: linear-gradient(135deg, #ec4899, #db2777); }
.cat-education .pin-marker { background: linear-gradient(135deg, #14b8a6, #0d9488); }

/* Glow effect */
.pin-glow {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 60px; height: 60px;
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
.pin-center .pin-glow { background: rgba(139,92,246,0.2); width: 80px; height: 80px; }
.cat-food .pin-glow { background: rgba(239,68,68,0.15); }
.cat-shop .pin-glow { background: rgba(59,130,246,0.15); }
.cat-service .pin-glow { background: rgba(34,197,94,0.15); }
.cat-office .pin-glow { background: rgba(245,158,11,0.15); }
.cat-health .pin-glow { background: rgba(236,72,153,0.15); }
.cat-education .pin-glow { background: rgba(20,184,166,0.15); }

@keyframes pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
  50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
}

/* Legend */
.legend {
  position: absolute; bottom: 20px; left: 40px; right: 40px;
  display: flex; justify-content: space-between; align-items: flex-end;
  z-index: 10;
}
.legend-items {
  display: flex; gap: 20px; flex-wrap: wrap;
}
.legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: #94a3b8;
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%;
}
.legend-stat {
  text-align: right; color: #64748b; font-size: 12px;
}
.legend-stat strong {
  display: block; font-size: 28px; color: #8b5cf6; font-weight: 900;
}

/* Connection lines */
.connection {
  position: absolute; z-index: 1;
  border-top: 1px dashed rgba(139,92,246,0.15);
  transform-origin: left center;
}
</style>
</head>
<body>

<div class="map-container">
  <div class="header">
    <h1>🏋️ <span>Hawaii Sports</span> × Our Members</h1>
    <p>우리 회원님들의 비즈니스 네트워크 · 울란바토르</p>

    <!-- Sample pins - REPLACE WITH REAL DATA -->
    <div class="pin cat-food" style="left:35%;top:30%">

  <div class="legend">

    <div class="legend-stat">

  </div>
</div>
