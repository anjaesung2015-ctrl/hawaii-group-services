<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Hawaii POS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f23;color:#e2e8f0;font-family:-apple-system,sans-serif;min-height:100vh}
.hide{display:none!important}
input,select{padding:10px;border-radius:8px;border:1px solid #334;background:#1a1a2e;color:#e2e8f0;font-size:14px;width:100%}
input:focus,select:focus{border-color:#f59e0b;outline:none}
.btn{padding:8px 16px;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}
.bp{background:#f59e0b;color:#000}.bg{background:#22c55e;color:#fff}.bd{background:#ef4444;color:#fff}
.bo{background:#16213e;color:#e2e8f0;border:1px solid #334}.bi{background:#3b82f6;color:#fff}
.bsm{padding:5px 10px;font-size:11px}
.card{background:#1a1a2e;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #2d3748}
label{display:block;font-size:11px;color:#94a3b8;margin:6px 0 3px}
table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:6px 8px;text-align:left;border-bottom:1px solid #1e293b}th{color:#94a3b8}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.header{background:#1a1a2e;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:1px solid #2d3748}
.nav{display:flex;overflow-x:auto;background:#16213e;border-bottom:1px solid #2d3748;scrollbar-width:none}.nav::-webkit-scrollbar{display:none}
.nav button{padding:10px 14px;border:none;background:none;color:#94a3b8;font-size:12px;white-space:nowrap;border-bottom:2px solid transparent;cursor:pointer}
.nav button.on{color:#f59e0b;border-bottom-color:#f59e0b}
.main{padding:12px;max-width:900px;margin:0 auto}
.tab{display:none}.tab.on{display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
@media(max-width:500px){.g3,.g4{grid-template-columns:1fr 1fr}.poswrap{grid-template-columns:1fr!important}}
.stat{background:#16213e;border-radius:10px;padding:10px;text-align:center;border:1px solid #2d3748}
.stat .v{font-size:18px;font-weight:800;color:#f59e0b}.stat .l{font-size:10px;color:#94a3b8;margin-top:2px}
.poswrap{display:grid;grid-template-columns:1fr 280px;gap:10px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
.pc{background:#16213e;border:1px solid #2d3748;border-radius:8px;padding:8px;text-align:center;cursor:pointer}
.pc:hover{border-color:#f59e0b}
.btab{display:inline-block;padding:5px 12px;border-radius:15px;border:1px solid #334;background:none;color:#94a3b8;font-size:12px;cursor:pointer;margin:0 3px 6px 0}
.btab.on{background:#f59e0b;color:#000;border-color:#f59e0b}
.ci{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #2d3748;font-size:12px}
.ci:last-child{border:none}
.qb{width:22px;height:22px;border-radius:4px;border:1px solid #334;background:#1a1a2e;color:#e2e8f0;cursor:pointer;font-size:14px}
.cli{display:flex;align-items:center;gap:8px;padding:8px;background:#16213e;border-radius:8px;margin-bottom:4px;border:1px solid #2d3748;font-size:13px}
.cli.done{opacity:.5;text-decoration:line-through}
.ck{width:18px;height:18px;border-radius:4px;border:2px solid #334;cursor:pointer;flex-shrink:0;font-size:11px;text-align:center}
.ck.on{background:#22c55e;border-color:#22c55e}
.toast{position:fixed;bottom:15px;right:15px;background:#1a1a2e;border:1px solid #2d3748;border-radius:10px;padding:10px 16px;z-index:9999;font-size:13px;border-left:4px solid #22c55e}
.toast.er{border-left-color:#ef4444}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:12px}
.mdl{background:#1a1a2e;border-radius:14px;padding:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;border:1px solid #2d3748}
</style></head><body>
<div id="login" style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px">
<div class="card" style="max-width:340px;width:100%">
<h2 style="text-align:center;color:#f59e0b;margin-bottom:16px">Hawaii POS</h2>
<input id="lu" placeholder="아이디" value="admin"><br><br>
<input id="lp" type="password" placeholder="비밀번호" value="1234"><br><br>
<button class="btn bp" style="width:100%;padding:12px;font-size:15px" onclick="doLogin()">로그인</button>
<p id="le" style="color:#ef4444;text-align:center;margin-top:8px;font-size:12px"></p>
</div></div>
<div id="app" class="hide">
<div class="header"><h1 style="font-size:15px;color:#f59e0b">Hawaii POS</h1><div><span id="uname" style="font-size:12px;color:#f59e0b;margin-right:8px"></span><button class="btn bo bsm" onclick="doLogout()">로그아웃</button></div></div>
<div class="nav" id="nav"></div>
<div class="main" id="content"></div>
</div>
<div id="modal" class="hide"></div>
<script>
var T=null,U=null,CART=[],BIZ='피트니스',PRODS=[],TAB='dash',BASE='/pos/api';
function gc(n){return(document.cookie.match(new RegExp(n+'=([^;]+)'))||[])[1]||null}
function sc(n,v){document.cookie=n+'='+v+';path=/;max-age=2592000;SameSite=Lax'}
function dc(n){document.cookie=n+'=;path=/;max-age=0'}
function getT(){try{return localStorage.getItem('pos_t')}catch(e){}return gc('pos_token')}
function getU(){try{var v=localStorage.getItem('pos_u');if(v)return JSON.parse(v)}catch(e){}try{var c=gc('pos_user');if(c)return JSON.parse(decodeURIComponent(c))}catch(e){}return null}
function saveAuth(t,u){T=t;U=u;sc('pos_token',t);sc('pos_user',encodeURIComponent(JSON.stringify(u)));try{localStorage.setItem('pos_t',t);localStorage.setItem('pos_u',JSON.stringify(u))}catch(e){}}
function clearAuth(){T=null;U=null;dc('pos_token');dc('pos_user');try{localStorage.removeItem('pos_t');localStorage.removeItem('pos_u')}catch(e){}}
function F(path,opts){opts=opts||{};var h={'Content-Type':'application/json'};if(T)h['Authorization']='Bearer '+T;opts.headers=h;if(opts.body&&typeof opts.body==='object')opts.body=JSON.stringify(opts.body);return fetch(BASE+path,opts).then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.error||'error');return d})})}
function doLogin(){var u=document.getElementById('lu').value,p=document.getElementById('lp').value;document.getElementById('le').textContent='';F('/login',{method:'POST',body:{username:u,password:p}}).then(function(d){saveAuth(d.token,d.user);initApp()}).catch(function(e){document.getElementById('le').textContent=e.message})}
document.getElementById('lp').onkeydown=function(e){if(e.key==='Enter')doLogin()};
function doLogout(){clearAuth();location.reload()}
function toast(m,err){var el=document.createElement('div');el.className='toast'+(err?' er':'');el.textContent=m;document.body.appendChild(el);setTimeout(function(){el.remove()},3000)}
function fmt(n){return String.fromCharCode(8382)+(n||0).toLocaleString()}
function isA(){return U&&U.role==='admin'}
function initApp(){T=T||getT();U=U||getU();if(!T||!U){document.getElementById('login').style.display='flex';document.getElementById('app').classList.add('hide');return}document.getElementById('login').style.display='none';document.getElementById('app').classList.remove('hide');document.getElementById('uname').textContent=U.name||U.username;var tabs=[['dash','대시보드'],['pos','POS'],['att','근태'],['cl','체크리스트']];if(isA())tabs.push(['sales','매출'],['prod','상품'],['fin','재무']);document.getElementById('nav').innerHTML=tabs.map(function(t){return'<button onclick="showTab(\''+t[0]+'\')" class="'+(t[0]==='dash'?'on':'')+'">'+t[1]+'</button>'}).join('');showTab('dash')}
function showTab(id){TAB=id;var names={dash:'대시보드',pos:'POS',att:'근태',cl:'체크리스트',sales:'매출',prod:'상품'};document.querySelectorAll('.nav button').forEach(function(b){b.classList.toggle('on',b.textContent===names[id])});if(id==='dash')loadDash();else if(id==='pos')loadPOS();else if(id==='att')loadAtt();else if(id==='cl')loadCL();else if(id==='sales')loadSales();else if(id==='prod')loadProd();else if(id==='fin')loadFin()}
function loadDash(){
var dp=F('/dashboard');
var fp=isA()?F('/finance/summary?from='+new Date().toISOString().slice(0,7)+'-01'):Promise.resolve(null);
Promise.all([dp,fp]).then(function(res){var d=res[0];var fin=res[1];var h='<h3 style="color:#f59e0b;margin-bottom:10px">대시보드</h3>';if(isA()&&d.todaySales){h+='<div style="font-size:11px;color:#94a3b8;margin-bottom:4px">오늘 POS 매출</div><div class="g4">';var biz={};d.todaySales.forEach(function(s){biz[s.business]=(biz[s.business]||0)+s.total});['피트니스','센터','샵'].forEach(function(b){h+='<div class="stat"><div class="v">'+fmt(biz[b]||0)+'</div><div class="l">'+b+'</div></div>'});h+='<div class="stat"><div class="v">'+fmt((d.monthSales&&d.monthSales.total)||0)+'</div><div class="l">이번달 POS</div></div></div>';if(fin&&fin.months){var mInc=0,mExp=0;fin.months.forEach(function(m){if(m.type==='income')mInc+=m.total;else mExp+=m.total});var tInc=0,tExp=0;if(fin.today)fin.today.forEach(function(t){if(t.type==='income')tInc+=t.total;else tExp+=t.total});h+='<div class="card" style="margin-top:8px"><b style="font-size:12px">이번달 재무 (전체)</b><div class="g3" style="margin-top:6px"><div class="stat"><div class="v" style="color:#22c55e">'+fmt(mInc)+'</div><div class="l">수입</div></div><div class="stat"><div class="v" style="color:#ef4444">'+fmt(mExp)+'</div><div class="l">지출</div></div><div class="stat"><div class="v" style="color:'+(mInc-mExp>=0?'#22c55e':'#ef4444')+'">'+fmt(mInc-mExp)+'</div><div class="l">순이익</div></div></div>';if(tInc||tExp)h+='<div style="font-size:11px;color:#94a3b8;margin-top:8px">오늘 재무: <span style="color:#22c55e">+'+fmt(tInc)+'</span> / <span style="color:#ef4444">-'+fmt(tExp)+'</span></div>';h+='</div>'}if(d.lowStock&&d.lowStock.length){h+='<div class="card"><b style="font-size:12px">재고 부족</b>';d.lowStock.forEach(function(p){h+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0">'+p.name+' <span class="badge" style="background:rgba(239,68,68,.2);color:#ef4444">'+p.stock+'</span></div>'});h+='</div>'}if(d.todayAttendance&&d.todayAttendance.length){h+='<div class="card"><b style="font-size:12px">출근 현황</b><table><tr><th>이름</th><th>출근</th><th>퇴근</th></tr>';d.todayAttendance.forEach(function(a){h+='<tr><td>'+a.staff_name+'</td><td>'+(a.clock_in?a.clock_in.slice(11,16):'-')+'</td><td>'+(a.clock_out?a.clock_out.slice(11,16):'-')+'</td></tr>'});h+='</table></div>'}}var a=d.myAttendance||{};h+='<div class="g2"><div class="card"><b style="font-size:12px">내 출퇴근</b><p style="font-size:13px;margin:6px 0">출근: '+(a.clock_in?a.clock_in.slice(11,16):'아직')+'</p><p style="font-size:13px">퇴근: '+(a.clock_out?a.clock_out.slice(11,16):'-')+'</p></div>';var cl=d.myChecklist||[];var dn=cl.filter(function(c){return c.is_done}).length;h+='<div class="card"><b style="font-size:12px">체크리스트 '+dn+'/'+cl.length+'</b>';cl.slice(0,5).forEach(function(c){h+='<div class="cli'+(c.is_done?' done':'')+'"><div class="ck'+(c.is_done?' on':'')+'">V</div>'+c.title+'</div>'});h+='</div></div>';document.getElementById('content').innerHTML=h}).catch(function(e){document.getElementById('content').innerHTML='<p style="color:#ef4444">'+e.message+'</p>'})}
function loadPOS(){F('/products').then(function(p){PRODS=p;renderPOS()}).catch(function(e){document.getElementById('content').innerHTML='<p style="color:#ef4444">'+e.message+'</p>'})}
function renderPOS(){var fp=PRODS.filter(function(p){return p.business===BIZ});var h='<div style="margin-bottom:8px">';['피트니스','센터','샵'].forEach(function(b){h+='<button class="btab'+(b===BIZ?' on':'')+'" onclick="BIZ=\''+b+'\';renderPOS()">'+b+'</button>'});h+='</div><div class="poswrap"><div><div class="pgrid">';if(!fp.length)h+='<p style="color:#94a3b8;font-size:12px;grid-column:1/-1;text-align:center;padding:20px">상품을 등록하세요</p>';fp.forEach(function(p){h+='<div class="pc" onclick="addCart('+p.id+')"><div style="font-size:12px;font-weight:600">'+p.name+'</div><div style="color:#f59e0b;font-size:13px;font-weight:700;margin-top:3px">'+fmt(p.price)+'</div><div style="font-size:10px;color:#94a3b8">'+p.stock+'</div></div>'});h+='</div></div><div><div class="card"><b style="font-size:12px">장바구니</b>';if(!CART.length)h+='<p style="color:#94a3b8;font-size:12px;text-align:center;padding:10px">상품 선택</p>';CART.forEach(function(c,i){h+='<div class="ci"><span style="flex:1">'+c.name+'</span><button class="qb" onclick="cq('+i+',-1)">-</button> '+c.qty+' <button class="qb" onclick="cq('+i+',1)">+</button><span style="color:#f59e0b;min-width:50px;text-align:right">'+fmt(c.price*c.qty)+'</span><button onclick="CART.splice('+i+',1);renderPOS()" style="background:none;border:none;color:#ef4444;cursor:pointer">X</button></div>'});var tot=CART.reduce(function(s,c){return s+c.price*c.qty},0);h+='<div style="border-top:1px solid #2d3748;margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;font-weight:700"><span>합계</span><span style="color:#f59e0b">'+fmt(tot)+'</span></div><label>결제</label><select id="pm"><option value="현금">현금</option><option value="카드">카드</option><option value="계좌">계좌</option></select><button class="btn bp" style="width:100%;padding:10px;margin-top:8px;font-size:14px" onclick="checkout()">결제</button><button class="btn bo" style="width:100%;margin-top:4px" onclick="CART=[];renderPOS()">비우기</button></div></div></div>';document.getElementById('content').innerHTML=h}
function addCart(id){var p=PRODS.find(function(x){return x.id===id});if(!p)return;var e=CART.find(function(x){return x.id===id});if(e)e.qty++;else CART.push({id:p.id,name:p.name,price:p.price,qty:1});renderPOS()}
function cq(i,d){CART[i].qty+=d;if(CART[i].qty<=0)CART.splice(i,1);renderPOS()}
function checkout(){if(!CART.length)return toast('장바구니 비어있음',true);var pm=document.getElementById('pm');F('/sales',{method:'POST',body:{business:BIZ,items:CART,payment:pm?pm.value:'현금'}}).then(function(r){toast('결제 완료! '+fmt(r.total));CART=[];loadPOS()}).catch(function(e){toast(e.message,true)})}
function loadAtt(){var today=new Date().toISOString().slice(0,10);var h='<div class="card" style="text-align:center"><div style="font-size:28px;font-weight:700;color:#f59e0b" id="clk2">--:--:--</div><div style="color:#94a3b8;font-size:13px;margin:4px 0 12px" id="cdt2"></div><div id="astat"></div><div style="display:flex;gap:8px;justify-content:center;margin-top:12px"><button class="btn bg" id="bi" onclick="clockIn()">출근</button><button class="btn bd" id="boo" onclick="clockOut()" disabled>퇴근</button></div></div><div class="card"><b style="font-size:12px">기록</b><table><thead><tr><th>날짜</th><th>이름</th><th>출근</th><th>퇴근</th></tr></thead><tbody id="atbl"></tbody></table></div>';document.getElementById('content').innerHTML=h;function tick(){var n=new Date();var el=document.getElementById('clk2');if(el)el.textContent=n.toTimeString().slice(0,8);var dl=document.getElementById('cdt2');if(dl)dl.textContent=n.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}tick();if(window._clk)clearInterval(window._clk);window._clk=setInterval(tick,1000);F('/attendance/today').then(function(r){var bi=document.getElementById('bi'),bo=document.getElementById('boo'),st=document.getElementById('astat');if(r&&r.clock_in&&!r.clock_out){bi.disabled=true;bo.disabled=false;st.innerHTML='<span class="badge" style="background:rgba(34,197,94,.2);color:#22c55e">근무중 '+r.clock_in.slice(11,16)+'</span>'}else if(r&&r.clock_out){bi.disabled=true;bo.disabled=true;st.innerHTML='<span class="badge" style="background:rgba(59,130,246,.2);color:#3b82f6">퇴근 '+r.clock_out.slice(11,16)+'</span>'}else{bi.disabled=false;bo.disabled=true;st.innerHTML='<span class="badge" style="background:rgba(239,68,68,.2);color:#ef4444">출근 전</span>'}}).catch(function(){});F('/attendance?from='+today.slice(0,7)+'-01&to='+today).then(function(r){var tb=document.getElementById('atbl');if(tb)tb.innerHTML=r.map(function(a){return'<tr><td>'+a.date+'</td><td>'+(a.staff_name||'-')+'</td><td>'+(a.clock_in?a.clock_in.slice(11,16):'-')+'</td><td>'+(a.clock_out?a.clock_out.slice(11,16):'-')+'</td></tr>'}).join('')||'<tr><td colspan="4" style="text-align:center;color:#94a3b8">없음</td></tr>'}).catch(function(){})}
function clockIn(){F('/attendance/in',{method:'POST'}).then(function(){toast('출근!');loadAtt()}).catch(function(e){toast(e.message,true)})}
function clockOut(){F('/attendance/out',{method:'POST'}).then(function(){toast('퇴근!');loadAtt()}).catch(function(e){toast(e.message,true)})}
function loadCL(){var today=new Date().toISOString().slice(0,10);F('/checklist?date='+today).then(function(items){var h='';if(isA())h+='<button class="btn bi bsm" style="margin-bottom:8px" onclick="autoAssign()">자동배정</button> ';var dn=items.filter(function(c){return c.is_done}).length;h+='<span style="font-size:12px;color:#94a3b8">'+dn+'/'+items.length+' 완료</span>';if(isA()){var by={};items.forEach(function(i){var k=i.staff_name||'미배정';if(!by[k])by[k]=[];by[k].push(i)});Object.keys(by).forEach(function(name){h+='<div class="card"><b style="font-size:12px">'+name+'</b>';by[name].forEach(function(c){h+='<div class="cli'+(c.is_done?' done':'')+'"><div class="ck'+(c.is_done?' on':'')+'" onclick="toggleCL('+c.id+')">V</div><span style="flex:1">'+c.title+'</span><span style="color:#ef4444;cursor:pointer;font-size:10px" onclick="delCL('+c.id+')">X</span></div>'});h+='</div>'})}else{h+='<div class="card">';items.forEach(function(c){h+='<div class="cli'+(c.is_done?' done':'')+'"><div class="ck'+(c.is_done?' on':'')+'" onclick="toggleCL('+c.id+')">V</div><span style="flex:1">'+c.title+'</span><span style="color:#ef4444;cursor:pointer;font-size:10px" onclick="delCL('+c.id+')">X</span></div>'});if(!items.length)h+='<p style="color:#94a3b8;font-size:12px">없음</p>';h+='</div>'}h+='<div class="card" style="display:flex;gap:6px"><input id="newcl" placeholder="새 할일" style="flex:1"><button class="btn bp" onclick="addCL()">추가</button></div>';document.getElementById('content').innerHTML=h}).catch(function(e){document.getElementById('content').innerHTML='<p style="color:#ef4444">'+e.message+'</p>'})}
function toggleCL(id){F('/checklist/'+id+'/toggle',{method:'PUT'}).then(function(){loadCL()}).catch(function(e){toast(e.message,true)})}
function delCL(id){F('/checklist/'+id,{method:'DELETE'}).then(function(){loadCL()}).catch(function(e){toast(e.message,true)})}
function addCL(){var el=document.getElementById('newcl');if(!el||!el.value.trim())return;F('/checklist',{method:'POST',body:{title:el.value.trim()}}).then(function(){loadCL()}).catch(function(e){toast(e.message,true)})}
function autoAssign(){F('/checklist/assign',{method:'POST'}).then(function(){toast('배정 완료');loadCL()}).catch(function(e){toast(e.message,true)})}
function loadSales(){var today=new Date().toISOString().slice(0,10);var h='<div class="card"><div class="g3"><div><label>시작</label><input type="date" id="s1" value="'+today.slice(0,7)+'-01" onchange="fSales()"></div><div><label>종료</label><input type="date" id="s2" value="'+today+'" onchange="fSales()"></div><div><label>사업장</label><select id="sb" onchange="fSales()"><option value="">전체</option><option>피트니스</option><option>센터</option><option>샵</option></select></div></div></div><div class="g3" id="sstat"></div><div class="card"><table><thead><tr><th>일시</th><th>사업장</th><th>직원</th><th>결제</th><th>금액</th></tr></thead><tbody id="stbl"></tbody></table></div>';document.getElementById('content').innerHTML=h;fSales()}
function fSales(){var f=document.getElementById('s1'),t=document.getElementById('s2'),b=document.getElementById('sb');var url='/sales?';if(f&&f.value)url+='from='+f.value+'&';if(t&&t.value)url+='to='+t.value+'&';if(b&&b.value)url+='business='+b.value+'&';F(url).then(function(sales){var biz={};sales.forEach(function(s){biz[s.business]=(biz[s.business]||0)+s.total});var grand=sales.reduce(function(a,s){return a+s.total},0);var sh='<div class="stat"><div class="v">'+fmt(grand)+'</div><div class="l">합계 ('+sales.length+'건)</div></div>';Object.keys(biz).forEach(function(b){sh+='<div class="stat"><div class="v">'+fmt(biz[b])+'</div><div class="l">'+b+'</div></div>'});document.getElementById('sstat').innerHTML=sh;document.getElementById('stbl').innerHTML=sales.map(function(s){return'<tr><td>'+(s.created_at?s.created_at.slice(0,16):'-')+'</td><td>'+s.business+'</td><td>'+(s.staff_name||'-')+'</td><td><span class="badge" style="background:rgba(59,130,246,.2);color:#3b82f6">'+s.payment+'</span></td><td style="color:#f59e0b;font-weight:700">'+fmt(s.total)+'</td><td><button class="btn bd bsm" onclick="delTx('+t.id+')">X</button></td></tr>'}).join('')||'<tr><td colspan="6" style="text-align:center;color:#94a3b8">없음</td></tr>'}).catch(function(e){toast(e.message,true)})}
function loadProd(){var h='<button class="btn bp bsm" onclick="openPM()" style="margin-bottom:8px">+ 추가</button><div class="card"><table><thead><tr><th>상품</th><th>사업장</th><th>가격</th><th>재고</th><th></th></tr></thead><tbody id="ptbl"></tbody></table></div>';document.getElementById('content').innerHTML=h;F('/products').then(function(prods){PRODS=prods;document.getElementById('ptbl').innerHTML=prods.map(function(p){return'<tr><td>'+p.name+'</td><td>'+p.business+'</td><td style="color:#f59e0b">'+fmt(p.price)+'</td><td>'+p.stock+'</td><td><button class="btn bo bsm" onclick="openPM('+p.id+')">수정</button> <button class="btn bd bsm" onclick="delP('+p.id+')">삭제</button></td></tr>'}).join('')||'<tr><td colspan="5" style="text-align:center;color:#94a3b8">없음</td></tr>'}).catch(function(e){toast(e.message,true)})}
function openPM(id){var p=id?PRODS.find(function(x){return x.id===id}):null;document.getElementById('modal').innerHTML='<div class="mbg" onclick="closeM()"><div class="mdl" onclick="event.stopPropagation()"><h3 style="color:#f59e0b;margin-bottom:10px">'+(p?'수정':'추가')+'</h3><label>상품명</label><input id="pn" value="'+(p?p.name:'')+'"><div class="g2"><div><label>사업장</label><select id="pb"><option'+(p&&p.business==='피트니스'?' selected':'')+'>피트니스</option><option'+(p&&p.business==='센터'?' selected':'')+'>센터</option><option'+(p&&p.business==='샵'?' selected':'')+'>샵</option></select></div><div><label>카테고리</label><input id="pcc" value="'+(p?p.category||'':'')+'"></div></div><div class="g2"><div><label>가격</label><input type="number" id="pp" value="'+(p?p.price:0)+'"></div><div><label>재고</label><input type="number" id="pk" value="'+(p?p.stock:0)+'"></div></div><div style="display:flex;gap:6px;margin-top:12px;justify-content:flex-end"><button class="btn bo" onclick="closeM()">취소</button><button class="btn bp" onclick="saveP('+(id||'null')+')">저장</button></div></div></div>';document.getElementById('modal').classList.remove('hide')}
function saveP(id){var body={name:document.getElementById('pn').value,business:document.getElementById('pb').value,category:document.getElementById('pcc').value,price:Number(document.getElementById('pp').value),stock:Number(document.getElementById('pk').value)};F(id?'/products/'+id:'/products',{method:id?'PUT':'POST',body:body}).then(function(){closeM();toast('저장!');loadProd()}).catch(function(e){toast(e.message,true)})}
function delP(id){if(!confirm('삭제?'))return;F('/products/'+id,{method:'DELETE'}).then(function(){toast('삭제');loadProd()}).catch(function(e){toast(e.message,true)})}
function loadFin(){var today=new Date().toISOString().slice(0,10);
var h='<h3 style="color:#f59e0b;margin-bottom:8px">재무 관리</h3>';
h+='<div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap"><button class="btn bp bsm" onclick="openTxModal(&quot;income&quot;)">+ 수입</button><button class="btn bd bsm" onclick="openTxModal(&quot;expense&quot;)">+ 지출</button><button class="btn bi bsm" onclick="openExcel()">엑셀 업로드</button></div>';
h+='<div class="card"><div class="g3"><div><label>시작</label><input type="date" id="ff1" value="'+today.slice(0,7)+'-01" onchange="fFin()"></div><div><label>종료</label><input type="date" id="ff2" value="'+today+'" onchange="fFin()"></div><div><label>사업장</label><select id="ffb" onchange="fFin()"><option value="">전체</option><option value="피트니스">피트니스</option><option value="하와이센터">센터</option><option value="샵">샵</option></select></div></div></div>';
h+='<div class="g3" id="fstat"></div>';
h+='<div class="card"><div style="overflow-x:auto"><table><thead><tr><th>날짜</th><th>사업장</th><th>유형</th><th>금액</th><th>설명</th><th></th></tr></thead><tbody id="ftbl"></tbody></table></div></div>';
document.getElementById('content').innerHTML=h;fFin()}
function fFin(){var f=document.getElementById('ff1'),t=document.getElementById('ff2'),b=document.getElementById('ffb');var url='/finance/transactions?';if(f&&f.value)url+='from='+f.value+'&';if(t&&t.value)url+='to='+t.value+'&';if(b&&b.value)url+='business='+b.value+'&';F(url).then(function(txs){var inc=0,exp=0;txs.forEach(function(t){if(t.type==='income')inc+=t.amount;else exp+=t.amount});document.getElementById('fstat').innerHTML='<div class="stat"><div class="v" style="color:#22c55e">'+fmt(inc)+'</div><div class="l">수입</div></div><div class="stat"><div class="v" style="color:#ef4444">'+fmt(exp)+'</div><div class="l">지출</div></div><div class="stat"><div class="v">'+fmt(inc-exp)+'</div><div class="l">순이익</div></div>';document.getElementById('ftbl').innerHTML=txs.map(function(t){return'<tr><td>'+t.transaction_date+'</td><td>'+t.biz_name+'</td><td><span class="badge" style="background:rgba('+(t.type==='income'?'34,197,94':'239,68,68')+',.2);color:'+(t.type==='income'?'#22c55e':'#ef4444')+'">'+(t.type==='income'?'수입':'지출')+'</span></td><td style="color:'+(t.type==='income'?'#22c55e':'#ef4444')+';font-weight:700">'+fmt(t.amount)+'</td><td style="font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(t.description||'-')+'</td><td><button class="btn bd bsm" onclick="delTx('+t.id+')">X</button></td></tr>'}).join('')||'<tr><td colspan="6" style="text-align:center;color:#94a3b8">없음</td></tr>'}).catch(function(e){toast(e.message,true)})}
var BIZLIST=[],CATLIST=[];
function loadBizCat(){return Promise.all([F('/finance/businesses'),F('/finance/categories')]).then(function(r){BIZLIST=r[0];CATLIST=r[1]})}
function openTxModal(type){loadBizCat().then(function(){
var title=type==='income'?'수입 입력':'지출 입력';
var today=new Date().toISOString().slice(0,10);
document.getElementById('modal').innerHTML='<div class="mbg" onclick="closeM()"><div class="mdl" onclick="event.stopPropagation()"><h3 style="color:#f59e0b">'+title+'</h3><label>사업장</label><select id="tx_biz" onchange="updateCats()">'+BIZLIST.map(function(b){return'<option value="'+b.id+'">'+(b.icon||'')+b.name+'</option>'}).join('')+'</select><label>카테고리</label><select id="tx_cat"><option value="">선택</option></select><label>금액</label><input type="number" id="tx_amt" placeholder="금액"><label>설명</label><input id="tx_desc" placeholder="설명"><label>결제수단</label><select id="tx_pay"><option value="cash">현금</option><option value="card">카드</option><option value="account">계좌</option><option value="mixed">혼합</option></select><label>날짜</label><input type="date" id="tx_date" value="'+today+'"><div style="display:flex;gap:6px;margin-top:12px;justify-content:flex-end"><button class="btn bo" onclick="closeM()">취소</button><button class="btn bp" onclick="saveTx(&quot;'+type+'&quot;)">저장</button></div></div></div>';
document.getElementById('modal').classList.remove('hide');updateCats()})}
function updateCats(){var bid=document.getElementById('tx_biz').value;var sel=document.getElementById('tx_cat');sel.innerHTML='<option value="">선택</option>'+CATLIST.filter(function(c){return c.business_id==bid||c.business_id==0}).map(function(c){return'<option value="'+c.id+'">'+c.name+'</option>'}).join('')}
function saveTx(type){var body={business_id:+document.getElementById('tx_biz').value,category_id:+document.getElementById('tx_cat').value||null,type:type,amount:+document.getElementById('tx_amt').value,description:document.getElementById('tx_desc').value,payment_method:document.getElementById('tx_pay').value,transaction_date:document.getElementById('tx_date').value};if(!body.amount)return toast('금액 입력',true);F('/finance/transaction',{method:'POST',body:body}).then(function(){closeM();toast('저장!');fFin()}).catch(function(e){toast(e.message,true)})}
function delTx(id){if(!confirm('삭제?'))return;F('/finance/transaction/'+id,{method:'DELETE'}).then(function(){toast('삭제');fFin()}).catch(function(e){toast(e.message,true)})}
function openExcel(){document.getElementById('modal').innerHTML='<div class="mbg" onclick="closeM()"><div class="mdl" onclick="event.stopPropagation()"><h3 style="color:#f59e0b">엑셀 업로드</h3><p style="font-size:12px;color:#94a3b8;margin-bottom:10px">피트니스/센터/샵 엑셀 파일을 업로드하면 자동으로 파싱되어 저장됩니다.</p><input type="file" id="exFile" accept=".xlsx,.xls" style="margin-bottom:10px"><div id="exResult"></div><div style="display:flex;gap:6px;margin-top:12px;justify-content:flex-end"><button class="btn bo" onclick="closeM()">닫기</button><button class="btn bp" onclick="uploadExcel()">업로드</button></div></div></div>';document.getElementById('modal').classList.remove('hide')}
function uploadExcel(){var f=document.getElementById('exFile').files[0];if(!f)return toast('파일 선택',true);var fd=new FormData();fd.append('file',f);fetch(BASE+'/finance/excel',{method:'POST',headers:{'Authorization':'Bearer '+T},body:fd}).then(function(r){return r.json()}).then(function(d){if(d.error){document.getElementById('exResult').innerHTML='<p style="color:#ef4444">'+d.error+'</p>';return}var h='<p style="color:#22c55e;font-weight:700">'+d.type+' / '+d.date+'</p>';if(d.results)d.results.forEach(function(r){h+='<p style="font-size:12px">'+(r.skip?'<span style="color:#94a3b8">중복 스킵: </span>':'<span style="color:#22c55e">입력: </span>')+r.desc+(r.amount?' '+fmt(r.amount):'')+'</p>'});document.getElementById('exResult').innerHTML=h;fFin()}).catch(function(e){toast(e.message,true)})}
function closeM(){document.getElementById('modal').classList.add('hide');document.getElementById('modal').innerHTML=''}
T=getT();U=getU();if(T&&U)initApp();else{document.getElementById('login').style.display='flex';document.getElementById('app').classList.add('hide')}
</script></body></html>
