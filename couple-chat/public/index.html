<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>💕 Us</title>
<style>
:root{--bg:#0a0009;--bg2:#150015;--card:#1f0025;--primary:#e879a8;--primary2:#d4548e;--mine:#4a1942;--theirs:#1a1040;--text:#f5e6f0;--text2:#9a7a9a;--border:rgba(255,200,255,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden}
/* Hearts bg */
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 20% 50%,rgba(232,121,168,0.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(168,85,247,0.05) 0%,transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;height:100dvh}
/* Header */
.header{padding:0.8rem 1rem;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-bottom:1px solid var(--border)}
.header-left{display:flex;align-items:center;gap:0.6rem}
.partner-status{display:flex;align-items:center;gap:0.4rem}
.partner-emoji{font-size:1.5rem}
.partner-name{font-weight:700;font-size:1rem}
.online-badge{font-size:0.7rem;padding:2px 8px;border-radius:10px;background:rgba(34,197,94,0.2);color:#22c55e}
.offline-badge{font-size:0.7rem;padding:2px 8px;border-radius:10px;background:rgba(150,150,150,0.2);color:#999}
/* Messages */
.messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.5rem}
.msg{max-width:80%;animation:fadeIn .3s}
.msg.mine{align-self:flex-end}
.msg.theirs{align-self:flex-start}
.msg-bubble{padding:0.7rem 1rem;border-radius:20px;font-size:0.95rem;line-height:1.5;position:relative;word-wrap:break-word}
.msg.mine .msg-bubble{background:linear-gradient(135deg,#e879a8,#a855f7);color:white;border-bottom-right-radius:6px}
.msg.theirs .msg-bubble{background:var(--card);border-bottom-left-radius:6px}
.msg-trans{font-size:0.8rem;opacity:0.65;margin-top:5px;padding-top:5px;border-top:1px dashed rgba(255,255,255,0.15)}
.msg-time{font-size:0.65rem;opacity:0.4;margin-top:3px;text-align:right}
.msg.theirs .msg-time{text-align:left}
.msg-reaction{position:absolute;bottom:-8px;right:8px;font-size:1rem;cursor:pointer;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5))}
.msg.theirs .msg-reaction{left:8px;right:auto}
.msg-translating{font-size:0.7rem;opacity:0.4;margin-top:3px;font-style:italic}
/* Date */
.date-sep{text-align:center;padding:0.5rem 0;font-size:0.7rem;color:var(--text2)}
.date-sep span{background:var(--bg);padding:0 0.8rem;position:relative;z-index:1}
/* Input */
.input-area{padding:0.6rem 1rem;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:0.5rem;align-items:flex-end}
.input-area textarea{flex:1;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:0.7rem 1rem;color:var(--text);font-size:0.95rem;resize:none;max-height:100px;outline:none;font-family:inherit;line-height:1.4}
.input-area textarea:focus{border-color:var(--primary)}
.send-btn{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,#e879a8,#a855f7);color:white;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s}
.send-btn:hover{transform:scale(1.08)}
/* Typing */
.typing{font-size:0.75rem;color:var(--text2);padding:0 1rem 0.2rem;min-height:1em;font-style:italic}
/* Login */
#login{display:flex;align-items:center;justify-content:center;height:100vh;padding:1rem;position:relative;z-index:1}
.login-box{background:var(--card);border-radius:28px;padding:2.5rem 2rem;width:100%;max-width:340px;text-align:center;border:1px solid var(--border)}
.login-box h1{font-size:2.5rem;margin-bottom:0.2rem}
.login-box p{color:var(--text2);margin-bottom:1.5rem;font-size:0.9rem}
.login-box input{width:100%;padding:0.75rem 1rem;border:1px solid var(--border);border-radius:16px;background:var(--bg);color:var(--text);font-size:1rem;margin-bottom:0.7rem;outline:none;text-align:center}
.login-box input:focus{border-color:var(--primary)}
.login-box button{width:100%;padding:0.8rem;border:none;border-radius:16px;background:linear-gradient(135deg,#e879a8,#a855f7);color:white;font-size:1rem;font-weight:700;cursor:pointer;margin-top:0.3rem}
.login-error{color:#ef4444;font-size:0.8rem;margin-top:0.5rem}
#app{display:none}
/* Emoji reactions */
.reaction-picker{position:absolute;bottom:100%;right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px;display:none;gap:2px;z-index:10}
.reaction-picker.show{display:flex}
.reaction-picker span{cursor:pointer;font-size:1.2rem;padding:3px;border-radius:6px;transition:transform .1s}
.reaction-picker span:hover{transform:scale(1.3)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h1>💕</h1>
    <p>우리 둘만의 공간<br>Зөвхөн бид хоёрын зай</p>
    <input id="l-user" placeholder="아이디 / Нэвтрэх нэр">
    <input id="l-pass" type="password" placeholder="비밀번호 / Нууц үг">
    <button onclick="doLogin()">💕 시작하기</button>
    <div id="l-error" class="login-error"></div>
  </div>
</div>

<div id="app" class="app">
  <div class="header">
    <div class="header-left">
      <span class="partner-emoji" id="partner-emoji">👸</span>
      <div>
        <div class="partner-name" id="partner-name">...</div>
        <div id="partner-status"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:0.5rem">
      <span id="my-emoji" style="font-size:1.3rem"></span>
      <button style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem" onclick="openSettings()">⚙️</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="typing" id="typing"></div>
  <div class="input-area">
    <textarea id="msg-input" rows="1" placeholder="💬" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendMessage()">💌</button>
  </div>
</div>

<script>
const API = window.location.pathname.replace(/\/+$/, '');
let token = localStorage.getItem('couple_token');
let me = JSON.parse(localStorage.getItem('couple_me') || 'null');
let partner = null;
let ws = null;
let typingTimeout = null;
const reactions = ['❤️','😍','😂','🥺','💋','🔥','👍','😘'];

// 알림
const notifSound = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoGAACAgICAgICAgICAgICAgICAgICAgICAgICA');
function playNotif() { try { notifSound.currentTime=0; notifSound.volume=0.5; notifSound.play().catch(()=>{}); } catch(e){} }
function showNotif(title, body) {
  playNotif();
  if (document.hidden && 'Notification' in window && Notification.permission === 'granted') {
    const n = new Notification(title, { body, tag: 'couple' });
    n.onclick = () => { window.focus(); n.close(); };
    setTimeout(() => n.close(), 5000);
  }
  if (document.hidden) {
    let blink = true; const orig = document.title;
    const iv = setInterval(() => { document.title = blink ? `💕 ${title}` : orig; blink = !blink; }, 1000);
    const stop = () => { clearInterval(iv); document.title = orig; window.removeEventListener('focus', stop); };
    window.addEventListener('focus', stop); setTimeout(stop, 30000);
  }
}

async function doLogin() {
  const res = await fetch(API + '/api/login', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username: document.getElementById('l-user').value.trim(), password: document.getElementById('l-pass').value }) });
  const data = await res.json();
  if (!res.ok) { document.getElementById('l-error').textContent = data.error; return; }
  token = data.token; me = data.user;
  localStorage.setItem('couple_token', token);
  localStorage.setItem('couple_me', JSON.stringify(me));
  initApp();
}
document.getElementById('l-pass')?.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function initApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('my-emoji').textContent = me.emoji;

  // Load partner info
  partner = await fetch(API + '/api/partner', { headers: { 'Authorization': 'Bearer ' + token } }).then(r=>r.json());
  document.getElementById('partner-emoji').textContent = partner?.emoji || '💕';
  document.getElementById('partner-name').textContent = partner?.name || '상대방';

  if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
  connectWS();
  loadMessages();
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}${API}/ws?token=${token}`);
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'presence') {
      const partnerOnline = partner && data.online.includes(partner.id);
      document.getElementById('partner-status').innerHTML = partnerOnline 
        ? '<span class="online-badge">온라인 ✨</span>' 
        : '<span class="offline-badge">오프라인</span>';
    }
    else if (data.type === 'new_message') {
      appendMsg(data.message);
      if (data.message.user_id !== me.id) showNotif(partner?.name || '💕', data.message.original_text.slice(0,100));
    }
    else if (data.type === 'message_update') updateMsg(data.message);
    else if (data.type === 'typing') showTyping();
    else if (data.type === 'reaction') {
      const el = document.querySelector(`[data-id="${data.msgId}"] .msg-reaction`);
      if (el) el.textContent = data.emoji || '';
    }
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
}

async function loadMessages() {
  const msgs = await fetch(API + '/api/messages', { headers: { 'Authorization': 'Bearer ' + token } }).then(r=>r.json());
  const container = document.getElementById('messages');
  container.innerHTML = '';
  let lastDate = '';
  msgs.forEach(m => {
    const d = (m.created_at||'').split(' ')[0];
    if (d !== lastDate) { lastDate = d; addDateSep(d); }
    addMsgEl(m);
  });
  container.scrollTop = container.scrollHeight;
}

function addDateSep(d) {
  const el = document.createElement('div');
  el.className = 'date-sep';
  el.innerHTML = `<span>${d}</span>`;
  document.getElementById('messages').appendChild(el);
}

function getMsgTexts(m) {
  const koText = m.translated_ko || (m.original_lang === 'ko' ? m.original_text : null);
  const mnText = m.translated_mn || (m.original_lang === 'mn' ? m.original_text : null);
  const main = me.lang === 'ko' ? (koText || m.original_text) : (mnText || m.original_text);
  let trans = me.lang === 'ko' ? mnText : koText;
  if (trans === main) trans = null;
  const translating = !m.translated_ko && !m.translated_mn && m.original_lang !== me.lang;
  return { main, trans, translating };
}

function addMsgEl(m) {
  const isMine = m.user_id === me.id;
  const { main, trans, translating } = getMsgTexts(m);
  const time = (m.created_at||'').split(' ')[1]?.slice(0,5) || '';

  const div = document.createElement('div');
  div.className = `msg ${isMine ? 'mine' : 'theirs'}`;
  div.dataset.id = m.id;
  div.innerHTML = `
    <div class="msg-bubble" onclick="toggleReaction(this,${m.id})">
      <div>${esc(main)}</div>
      ${trans ? `<div class="msg-trans">${esc(trans)}</div>` : ''}
      ${translating ? `<div class="msg-translating">번역 중... ⏳</div>` : ''}
      <div class="msg-time">${time}</div>
      ${m.reaction ? `<div class="msg-reaction">${m.reaction}</div>` : '<div class="msg-reaction"></div>'}
      <div class="reaction-picker">${reactions.map(r=>`<span onclick="event.stopPropagation();react(${m.id},'${r}')">${r}</span>`).join('')}</div>
    </div>`;
  document.getElementById('messages').appendChild(div);
}

function appendMsg(m) {
  addMsgEl(m);
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
  document.getElementById('typing').textContent = '';
}

function updateMsg(m) {
  const el = document.querySelector(`[data-id="${m.id}"] .msg-bubble`);
  if (!el) return;
  const { main, trans } = getMsgTexts(m);
  const time = (m.created_at||'').split(' ')[1]?.slice(0,5) || '';
  el.innerHTML = `
    <div>${esc(main)}</div>
    ${trans ? `<div class="msg-trans">${esc(trans)}</div>` : ''}
    <div class="msg-time">${time}</div>
    ${m.reaction ? `<div class="msg-reaction">${m.reaction}</div>` : '<div class="msg-reaction"></div>'}
    <div class="reaction-picker">${reactions.map(r=>`<span onclick="event.stopPropagation();react(${m.id},'${r}')">${r}</span>`).join('')}</div>`;
}

function toggleReaction(bubble, msgId) {
  const picker = bubble.querySelector('.reaction-picker');
  document.querySelectorAll('.reaction-picker.show').forEach(p => { if(p!==picker) p.classList.remove('show'); });
  picker.classList.toggle('show');
}

function react(msgId, emoji) {
  ws?.send(JSON.stringify({ type: 'reaction', msgId, emoji }));
  document.querySelectorAll('.reaction-picker.show').forEach(p => p.classList.remove('show'));
}

function showTyping() {
  const name = partner?.name || '상대방';
  document.getElementById('typing').textContent = me.lang === 'ko' ? `${name} 입력 중... 💭` : `${name} бичиж байна... 💭`;
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => { document.getElementById('typing').textContent = ''; }, 3000);
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  autoResize(input);
  await fetch(API + '/api/messages', {
    method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ text })
  });
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); return; }
  ws?.send(JSON.stringify({ type: 'typing' }));
}

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

if (token && me) initApp();

// Back button
history.replaceState({v:1},'','');
history.pushState({v:2},'','');
history.pushState({v:3},'','');
window.addEventListener('popstate', () => { setTimeout(() => history.pushState({v:Date.now()},'',''), 50); });

// Settings
function openSettings() {
  const overlay = document.createElement('div');
  overlay.id = 'settings-overlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem';
  const emojiList = ['🤴','👸','🦁','🐰','🌸','⭐','🌙','🔥','💎','🦋','🐱','🐶','🌺','🍀','👑','🎀','💜','🧸','🦊','🐧','😎','🥰','💖','🌈'];
  overlay.innerHTML = `
    <div style="background:var(--card);border-radius:24px;padding:1.5rem;width:100%;max-width:340px;border:1px solid var(--border)">
      <h3 style="text-align:center;margin:0 0 1.2rem">⚙️ ${me.lang==='ko'?'설정':'Тохиргоо'}</h3>
      <div style="margin-bottom:1rem">
        <label style="font-size:0.8rem;color:var(--text2);display:block;margin-bottom:4px">${me.lang==='ko'?'이름':'Нэр'}</label>
        <input id="s-name" value="${me.name}" style="width:100%;padding:0.6rem 1rem;border:1px solid var(--border);border-radius:12px;background:var(--bg);color:var(--text);font-size:1rem;outline:none">
      </div>
      <div style="margin-bottom:1rem">
        <label style="font-size:0.8rem;color:var(--text2);display:block;margin-bottom:4px">${me.lang==='ko'?'이모지':'Эможи'}</label>
        <div id="s-emoji-grid" style="display:flex;flex-wrap:wrap;gap:6px">${emojiList.map(e=>`<span onclick="pickEmoji('${e}')" style="font-size:1.5rem;cursor:pointer;padding:4px 6px;border-radius:8px;${me.emoji===e?'background:var(--primary)':''}" class="emoji-opt">${e}</span>`).join('')}</div>
        <div style="margin-top:6px;font-size:0.8rem;color:var(--text2)">${me.lang==='ko'?'선택됨':'Сонгосон'}: <span id="s-emoji-picked">${me.emoji}</span></div>
      </div>
      <div style="margin-bottom:1rem">
        <label style="font-size:0.8rem;color:var(--text2);display:block;margin-bottom:4px">${me.lang==='ko'?'새 비밀번호 (변경 시)':'Шинэ нууц үг'}</label>
        <input id="s-pass" type="password" placeholder="${me.lang==='ko'?'변경 안 하려면 비워두세요':'Хэвээр үлдээхийн тулд хоосон орхино'}" style="width:100%;padding:0.6rem 1rem;border:1px solid var(--border);border-radius:12px;background:var(--bg);color:var(--text);font-size:1rem;outline:none">
      </div>
      <div style="display:flex;gap:0.5rem;margin-top:1.2rem">
        <button onclick="closeSettings()" style="flex:1;padding:0.7rem;border:1px solid var(--border);border-radius:12px;background:var(--bg);color:var(--text);font-size:0.9rem;cursor:pointer">${me.lang==='ko'?'취소':'Цуцлах'}</button>
        <button onclick="saveSettings()" style="flex:1;padding:0.7rem;border:none;border-radius:12px;background:linear-gradient(135deg,#e879a8,#a855f7);color:white;font-size:0.9rem;font-weight:700;cursor:pointer">${me.lang==='ko'?'저장 💕':'Хадгалах 💕'}</button>
      </div>
      <button onclick="localStorage.clear();location.reload()" style="width:100%;margin-top:0.8rem;padding:0.6rem;border:1px solid rgba(239,68,68,0.3);border-radius:12px;background:transparent;color:#ef4444;font-size:0.85rem;cursor:pointer">🚪 ${me.lang==='ko'?'로그아웃':'Гарах'}</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if(e.target === overlay) closeSettings(); });
}

let selectedEmoji = me?.emoji;
function pickEmoji(e) {
  selectedEmoji = e;
  document.getElementById('s-emoji-picked').textContent = e;
  document.querySelectorAll('.emoji-opt').forEach(el => {
    el.style.background = el.textContent === e ? 'var(--primary)' : '';
  });
}

function closeSettings() {
  document.getElementById('settings-overlay')?.remove();
}

async function saveSettings() {
  const name = document.getElementById('s-name').value.trim();
  const pass = document.getElementById('s-pass').value;
  const body = {};
  if (name && name !== me.name) body.name = name;
  if (selectedEmoji && selectedEmoji !== me.emoji) body.emoji = selectedEmoji;
  if (pass) body.password = pass;

  if (Object.keys(body).length === 0) { closeSettings(); return; }

  const res = await fetch(API + '/api/me', {
    method: 'PUT', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (data.name) me.name = data.name;
  if (data.emoji) me.emoji = data.emoji;
  localStorage.setItem('couple_me', JSON.stringify(me));
  document.getElementById('my-emoji').textContent = me.emoji;
  closeSettings();

  if (pass) alert(me.lang === 'ko' ? '비밀번호가 변경되었어요 💕' : 'Нууц үг солигдлоо 💕');
}

// Close reaction pickers on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('.msg-bubble')) {
    document.querySelectorAll('.reaction-picker.show').forEach(p => p.classList.remove('show'));
  }
});
</script>
</body>
</html>
