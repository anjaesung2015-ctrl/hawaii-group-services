<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>센터 관리</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--primary:#10b981;--primary2:#059669;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;--info:#3b82f6;--text:#f1f5f9;--text2:#94a3b8;--sidebar-w:240px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.sidebar{position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;background:var(--card);padding:1rem;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.logo{font-size:1.1rem;font-weight:800;padding:0.5rem;margin-bottom:1rem;color:var(--primary)}
.nav-item{padding:0.7rem 0.8rem;border-radius:10px;cursor:pointer;font-size:0.88rem;margin:2px 0;transition:all .2s;display:flex;align-items:center;gap:0.6rem;color:var(--text2)}
.nav-item:hover,.nav-item.active{background:rgba(16,185,129,0.15);color:var(--primary)}
.main{margin-left:var(--sidebar-w);padding:1.5rem;min-height:100vh}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:0.5rem}
.page-header h2{font-size:1.3rem;font-weight:700}
.card{background:var(--card);border-radius:16px;padding:1.2rem;margin-bottom:1rem}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat{background:var(--card);border-radius:16px;padding:1.2rem}
.stat-value{font-size:1.6rem;font-weight:800;margin:0.3rem 0}
.stat-label{color:var(--text2);font-size:0.82rem}
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.5rem 1rem;border:none;border-radius:10px;cursor:pointer;font-size:0.85rem;font-weight:600;transition:all .2s;color:white}
.btn-primary{background:var(--primary)}.btn-primary:hover{background:var(--primary2)}
.btn-success{background:var(--success)}.btn-danger{background:var(--danger)}.btn-info{background:var(--info)}.btn-warning{background:var(--warning);color:#000}
.btn-sm{padding:0.35rem 0.7rem;font-size:0.8rem}
input,select,textarea{width:100%;padding:0.6rem 0.8rem;border:1px solid var(--card2);border-radius:10px;background:var(--bg);color:var(--text);font-size:0.9rem;outline:none}
input:focus,select:focus{border-color:var(--primary)}
.form-group{margin-bottom:0.8rem}.form-group label{display:block;font-size:0.8rem;color:var(--text2);margin-bottom:0.3rem;font-weight:600}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
th{text-align:left;padding:0.6rem;color:var(--text2);border-bottom:1px solid var(--card2);font-weight:600;font-size:0.78rem}
td{padding:0.6rem;border-bottom:1px solid rgba(255,255,255,0.03)}
.badge{padding:0.2rem 0.6rem;border-radius:20px;font-size:0.72rem;font-weight:600;display:inline-block}
.badge-available{background:rgba(34,197,94,0.15);color:var(--success)}
.badge-occupied{background:rgba(239,68,68,0.15);color:var(--danger)}
.badge-maintenance{background:rgba(245,158,11,0.15);color:var(--warning)}
.badge-good{background:rgba(34,197,94,0.15);color:var(--success)}
.badge-fair{background:rgba(245,158,11,0.15);color:var(--warning)}
.badge-poor{background:rgba(239,68,68,0.15);color:var(--danger)}
.section{display:none}.section.active{display:block}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--card);border-radius:20px;padding:1.5rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.hamburger{display:none;position:fixed;top:1rem;left:1rem;z-index:101;background:var(--card);border:none;color:var(--text);font-size:1.3rem;padding:0.5rem 0.7rem;border-radius:10px;cursor:pointer}
.facility-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem}
.facility-card{border-radius:16px;padding:1.2rem;text-align:center;cursor:pointer;transition:all .2s;border:2px solid transparent}
.facility-card:hover{transform:translateY(-2px)}
.facility-card.available{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.3)}
.facility-card.occupied{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.3)}
.facility-card.maintenance{background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.3)}
.checklist-item{display:flex;align-items:center;gap:0.8rem;padding:0.6rem 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.checklist-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--primary)}
.checklist-item.checked{opacity:0.5;text-decoration:line-through}
.time-slot{display:inline-block;padding:0.3rem 0.6rem;border-radius:8px;font-size:0.8rem;margin:0.2rem}
.time-slot.booked{background:rgba(59,130,246,0.15);color:var(--info)}
.time-slot.class{background:rgba(139,92,246,0.15);color:#8b5cf6}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.hamburger{display:block}.main{margin-left:0;padding:1rem}.form-row{grid-template-columns:1fr}.stat-grid{grid-template-columns:1fr 1fr}.facility-grid{grid-template-columns:1fr 1fr}}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
#app-screen{display:none}
.admin-only{display:none}
body.role-admin .admin-only{display:flex}
body.role-customer .staff-only{display:none}
</style>
</head>
<body>
<div id="login-screen">
  <div class="card" style="width:100%;max-width:420px;text-align:center;padding:2rem">
    <div style="font-size:3rem;margin-bottom:0.5rem">🏋️</div>
    <h2 style="margin:0 0 0.3rem;color:var(--primary)">센터 관리</h2>
    <p style="color:var(--text2);margin-bottom:1.5rem;font-size:0.85rem">시설 · 수업 · 장비 · 운영</p>
    <div style="display:flex;gap:0.3rem;margin-bottom:1.5rem">
      <button id="tab-login" class="btn btn-primary" style="flex:1;justify-content:center;font-size:0.82rem" onclick="showLoginTab('login')">🔐 로그인</button>
      <button id="tab-register" class="btn" style="flex:1;justify-content:center;background:var(--card2);font-size:0.82rem" onclick="showLoginTab('register')">📝 회원가입</button>
      <button id="tab-public" class="btn" style="flex:1;justify-content:center;background:var(--card2);font-size:0.82rem" onclick="showLoginTab('public')">👀 현황</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label>아이디</label><input id="login-user" placeholder="아이디"></div>
      <div class="form-group"><label>비밀번호</label><input type="password" id="login-pass" placeholder="비밀번호"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem;font-size:1rem" onclick="doLogin()">로그인</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group"><label>아이디 *</label><input id="reg-user" placeholder="아이디 (3자 이상)"></div>
      <div class="form-group"><label>비밀번호 *</label><input type="password" id="reg-pass" placeholder="비밀번호 (4자 이상)"></div>
      <div class="form-row">
        <div class="form-group"><label>이름 *</label><input id="reg-name" placeholder="이름"></div>
        <div class="form-group"><label>전화번호 *</label><input id="reg-phone" placeholder="99001234"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>성별</label><select id="reg-gender"><option value="M">👨 남</option><option value="F">👩 여</option></select></div>
        <div class="form-group"><label>생년월일</label><input type="date" id="reg-birth"></div>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem;font-size:1rem" onclick="doRegister()">🎾 회원가입</button>
    </div>
    <div id="public-view" style="display:none"></div>
    <button id="login-lang-toggle" class="btn btn-sm" style="background:var(--card2);width:100%;justify-content:center;margin-top:0.75rem" onclick="switchLang()">🇲🇳 Монгол</button>
    <p id="login-error" style="color:var(--danger);font-size:0.85rem;margin-top:0.5rem"></p>
  </div>
</div>

<div id="app-screen">
<button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
<div class="sidebar">
  <div class="logo">🏋️ 센터 관리</div>
  <a href="/center/portal" class="nav-item" style="background:rgba(16,185,129,0.1);margin-bottom:8px;text-decoration:none;color:var(--text2)"><i class="fas fa-th-large"></i> ← 포털</a>
  <div class="nav-item active" onclick="showSection('dashboard')"><i class="fas fa-home"></i> 현황판</div>
  <div class="nav-item" onclick="showSection('members')"><i class="fas fa-id-card"></i> 회원 관리</div>
  <div class="nav-item staff-only" onclick="showSection('approvals')"><i class="fas fa-bell"></i> 예약 승인 <span id="pending-badge" style="background:var(--warning);color:#000;border-radius:50%;padding:0 6px;font-size:0.7rem;margin-left:4px;display:none">0</span></div>
  <div class="nav-item" onclick="showSection('facilities')"><i class="fas fa-building"></i> 시설 현황</div>
  <div class="nav-item" onclick="showSection('bookings')"><i class="fas fa-calendar-alt"></i> 예약 관리</div>
  <div class="nav-item" onclick="showSection('classes')"><i class="fas fa-chalkboard-teacher"></i> 수업 관리</div>
  <div class="nav-item" onclick="showSection('equipment')"><i class="fas fa-dumbbell"></i> 장비 관리</div>
  <div class="nav-item" onclick="showSection('checklist')"><i class="fas fa-tasks"></i> 일일 체크</div>
  <div class="nav-item" onclick="showSection('notices')"><i class="fas fa-bullhorn"></i> 공지/메모</div>
  <div class="nav-item admin-only" onclick="showSection('users')"><i class="fas fa-users-cog"></i> 사용자 관리</div>
  <div style="flex:1"></div>
  <button id="lang-toggle" class="btn btn-sm" style="background:var(--card2);width:100%;justify-content:center;margin-bottom:0.5rem" onclick="switchLang()">🇲🇳 Монгол</button>
  <button class="btn btn-sm" style="background:var(--card2);width:100%;justify-content:center" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 로그아웃</button>
</div>

<div class="main">
  <div class="section active" id="sec-dashboard"></div>
  <div class="section" id="sec-members"></div>
  <div class="section" id="sec-facilities"></div>
  <div class="section" id="sec-bookings"></div>
  <div class="section" id="sec-classes"></div>
  <div class="section" id="sec-equipment"></div>
  <div class="section" id="sec-checklist"></div>
  <div class="section" id="sec-notices"></div>
  <div class="section" id="sec-users"></div>
  <div class="section" id="sec-approvals"></div>
  <div class="section" id="sec-cust-booking"></div>
  <div class="section" id="sec-cust-mybookings"></div>
  <div class="section" id="sec-cust-classes"></div>
</div>
</div>
<div id="modal-container"></div>

function t(k){return i18n[currentLang]?.[k]||i18n.ko[k]||k}
function switchLang(){currentLang=currentLang==='ko'?'mn':'ko';localStorage.setItem('center_lang',currentLang);applyLang()}
function applyLang(){try{
  const h=document.querySelector('#login-screen h2');if(h)h.textContent=t('appTitle');
  const s=document.querySelector('#login-screen .card>p');if(s)s.textContent=t('subtitle');
  const ll=document.querySelectorAll('#login-screen .form-group label');if(ll[0])ll[0].textContent=t('username');if(ll[1])ll[1].textContent=t('password');
  const lb=document.querySelector('#login-screen .btn-primary');if(lb)lb.textContent=t('login');
  const llb=document.getElementById('login-lang-toggle');if(llb)llb.textContent=t('langBtn');
  const nk=['dashboard','facilityStatus','bookingMgmt','classMgmt','equipmentMgmt','dailyCheck','noticeBoard'];
  document.querySelectorAll('.nav-item').forEach((el,i)=>{if(nk[i]){const ic=el.querySelector('i');if(ic)el.innerHTML=ic.outerHTML+' '+t(nk[i])}});
  const lo=document.querySelector('.logo');if(lo)lo.textContent='🏋️ '+t('appTitle');

function timeOptions(startH,endH,defaultVal,includeEnd){
  let opts='';
  for(let h=startH;h<=endH;h++){
    for(let m=0;m<60;m+=30){
      if(h===endH&&m>0&&!includeEnd)break;
      if(h===endH&&m===0&&!includeEnd&&h!==startH){}
      const val=String(h===24?'24':h).padStart(2,'0')+':'+String(m).padStart(2,'0');
      if(h===endH&&!includeEnd&&m>0)break;
      const label=h===24&&m===0?'24:00(마감)':val;
      opts+=`<option value="${val}" ${val===defaultVal?'selected':''}>${label}</option>`;
    }
  }
  return opts;
}

async function loadMonthView(){
  const facId=document.getElementById('bk-fac')?.value||'';
  const url='/api/bookings/month?month='+bkMonth+(facId?'&facility_id='+facId:'');
  const d=await apiFetch(url).then(r=>r.json());
  const label=document.getElementById('bk-month-label');
  if(label)label.textContent=bkMonth.replace('-','년 ')+'월';

  const cal=document.getElementById('month-calendar');
  if(!cal)return;

  // 달력 생성
  const year=parseInt(bkMonth.split('-')[0]);
  const mon=parseInt(bkMonth.split('-')[1])-1;
  const firstDay=new Date(year,mon,1).getDay();
  const lastDate=new Date(year,mon+1,0).getDate();
  const today=todayUB();

  let html=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem">
      <div><span style="font-size:0.85rem;color:var(--text2)">총 예약</span> <strong style="color:var(--info)">${d.totalCount}건</strong></div>
      <div><span style="font-size:0.85rem;color:var(--text2)">총 매출</span> <strong style="color:var(--primary)">${formatMoney(d.totalRevenue)}</strong></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:0.8rem">
      ${['일','월','화','수','목','금','토'].map((w,i)=>`<div style="text-align:center;padding:0.4rem;font-weight:700;color:${i===0?'var(--danger)':i===6?'var(--info)':'var(--text2)'}">${w}</div>`).join('')}`;

  // 빈칸
  for(let i=0;i<firstDay;i++) html+=`<div style="padding:0.3rem;min-height:70px"></div>`;

  for(let day=1;day<=lastDate;day++){
    const dateStr=bkMonth+'-'+String(day).padStart(2,'0');
    const info=d.byDate[dateStr];
    const isToday=dateStr===today;
    const dayOfWeek=(firstDay+day-1)%7;
    const isSun=dayOfWeek===0;const isSat=dayOfWeek===6;

    html+=`<div style="padding:0.3rem;min-height:70px;background:${isToday?'rgba(16,185,129,0.1)':'var(--bg)'};border-radius:8px;border:${isToday?'2px solid var(--primary)':'1px solid rgba(255,255,255,0.03)'};cursor:pointer;transition:background 0.15s" onclick="bkView='timeline';bkMonth='${bkMonth}';loadBookings();setTimeout(()=>{const el=document.getElementById('bk-date');if(el){el.value='${dateStr}';filterBookings()}},100)">
      <div style="font-weight:${isToday?'700':'500'};color:${isToday?'var(--primary)':isSun?'var(--danger)':isSat?'var(--info)':'var(--text)'};font-size:0.85rem;margin-bottom:0.2rem">${day}</div>`;

    if(info){
      html+=`<div style="font-size:0.7rem;color:var(--info);font-weight:600">${info.count}건</div>`;
      if(info.revenue>0) html+=`<div style="font-size:0.65rem;color:var(--primary);font-weight:600">${formatMoney(info.revenue)}</div>`;
      // 최대 2개 예약 미리보기
      info.bookings.slice(0,2).forEach(b=>{
        const isBulk=b.courts&&b.courts>1;
        html+=`<div style="font-size:0.6rem;background:${isBulk?'rgba(245,158,11,0.2)':'rgba(59,130,246,0.15)'};color:${isBulk?'var(--warning)':'var(--info)'};padding:0.1rem 0.2rem;border-radius:3px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.start_time.slice(0,5)} ${b.customer_name||''}${isBulk?' ('+b.courts+'코트)':''}</div>`;
      });
      if(info.bookings.length>2) html+=`<div style="font-size:0.6rem;color:var(--text2)">+${info.bookings.length-2}건</div>`;
    }
    html+=`</div>`;
  }

  html+=`</div>`;
  cal.innerHTML=html;
}

function autoEndDate(){
  const typeEl=document.getElementById('mb-type');
  const startEl=document.getElementById('mb-start');
  const endEl=document.getElementById('mb-end');
  if(!typeEl||!startEl||!endEl||!startEl.value)return;
  const start=new Date(startEl.value);
  const type=typeEl.value;
  const days={'1개월':30,'3개월':90,'6개월':180,'1년':365,'무제한':3650};
  if(days[type]){start.setDate(start.getDate()+days[type]);endEl.value=start.toISOString().split('T')[0]}
}
document.addEventListener('change',e=>{if(e.target.id==='mb-type')autoEndDate()});

function renderTimeline(bookings){
  const courts=facilities.filter(f=>f.hourly_rate>0);
  const slots=[];
  for(let h=6;h<=23;h++){for(let m=0;m<60;m+=30){slots.push({h,m,time:String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')})}}
  const now=new Date();const currentHour=now.getHours();const currentMin=now.getMinutes();
  const selDate=g('bk-date');const isToday=selDate===todayUB();

  const dow=['일','월','화','수','목','금','토'][new Date(selDate+'T00:00:00+08:00').getUTCDay()];

  function timeToMin(t){const[hh,mm]=t.split(':').map(Number);return hh*60+(mm||0)}

  let html=`<div style="display:grid;grid-template-columns:60px ${courts.map(()=>'1fr').join(' ')};gap:0;min-width:${60+courts.length*150}px">`;

  // 시합 그룹 감지: 같은 시간+같은 이름으로 여러 코트 예약
  function findBulkGroup(slot, cIdx){
    const slotMin=slot.h*60+slot.m;
    const first=bookings.find(b=>b.facility_id===courts[cIdx].id&&b.status!=='cancelled'&&timeToMin(b.start_time)===slotMin);
    if(!first)return null;
    let cnt=0;
    for(let i=cIdx;i<courts.length;i++){
      const b=bookings.find(bk=>bk.facility_id===courts[i].id&&bk.status!=='cancelled'&&bk.start_time===first.start_time&&bk.end_time===first.end_time&&bk.customer_name===first.customer_name);
      if(b)cnt++;else break;
    }
    return cnt>=2?{booking:first,span:cnt}:null;
  }

  const bulkRendered={};

  slots.forEach(slot=>{
    const slotMin=slot.h*60+slot.m;
    const nextMin=slotMin+30;
    const nextTime=String(Math.floor(nextMin/60)).padStart(2,'0')+':'+String(nextMin%60).padStart(2,'0');
    const isNow=isToday&&currentHour===slot.h&&((slot.m===0&&currentMin<30)||(slot.m===30&&currentMin>=30));
    const isHalf=slot.m===30;

    html+=`<div style="padding:0.25rem 0.4rem;font-size:0.75rem;font-weight:${isNow?'700':'400'};color:${isNow?'var(--primary)':isHalf?'var(--card2)':'var(--text2)'};border-bottom:1px solid rgba(255,255,255,${isHalf?'0.01':'0.03'});${isNow?'background:rgba(16,185,129,0.05)':''}">${slot.time}</div>`;

    let skipUntil=-1;
    courts.forEach((court,cIdx)=>{
      if(cIdx<skipUntil){return;}

      const booking=bookings.find(b=>{
        if(b.facility_id!==court.id||b.status==='cancelled')return false;
        const bStart=timeToMin(b.start_time);
        const bEnd=timeToMin(b.end_time);
        return slotMin>=bStart&&slotMin<bEnd;
      });

      const isStart=booking&&timeToMin(booking.start_time)===slotMin;

      // 시합 그룹 체크 (첫 슬롯에서만)
      if(isStart){
        const grp=findBulkGroup(slot,cIdx);
        if(grp){
          const bKey=grp.booking.start_time+grp.booking.customer_name;
          if(!bulkRendered[bKey]){
            bulkRendered[bKey]=true;
            html+=`<div style="grid-column:span ${grp.span};padding:0.3rem 0.5rem;background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(239,68,68,0.1));border-left:4px solid var(--warning);border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;text-align:center" onclick="viewBookingDetail(${grp.booking.id})" title="${grp.booking.customer_name} ${grp.booking.start_time}~${grp.booking.end_time}">
              <div style="font-size:0.85rem;font-weight:700;color:var(--warning)">${grp.booking.customer_name}</div>
              <div style="font-size:0.7rem;color:var(--text2)">${grp.booking.start_time}~${grp.booking.end_time} | ${grp.span}코트</div>
            </div>`;
            skipUntil=cIdx+grp.span;
            return;
          }
        }
      }

      // 시합 그룹의 연속 슬롯
      if(booking&&!isStart){
        const grp=findBulkGroup({h:Math.floor(timeToMin(booking.start_time)/60),m:timeToMin(booking.start_time)%60},cIdx);
        if(grp&&grp.span>=2){
          const bKey=booking.start_time+booking.customer_name;
          const contKey=bKey+'_cont_'+slotMin;
          if(!bulkRendered[contKey]){
            bulkRendered[contKey]=true;
            html+=`<div style="grid-column:span ${grp.span};padding:0.1rem;background:rgba(245,158,11,0.08);border-left:4px solid rgba(245,158,11,0.3);border-bottom:1px solid rgba(255,255,255,0.02)"></div>`;
            skipUntil=cIdx+grp.span;
            return;
          }
        }
        html+=`<div style="padding:0.2rem;background:rgba(59,130,246,0.06);border-left:3px solid rgba(59,130,246,0.3);border-bottom:1px solid rgba(255,255,255,0.02)"></div>`;
        return;
      }

      if(booking){
        if(isStart){
          html+=`<div style="padding:0.25rem 0.4rem;background:rgba(59,130,246,0.12);border-left:3px solid var(--info);border-bottom:1px solid rgba(255,255,255,0.03);${isNow?'box-shadow:inset 0 0 0 1px var(--primary)':''};cursor:pointer" onclick="viewBookingDetail(${booking.id})" title="${booking.customer_name||''} ${booking.start_time}~${booking.end_time}">
            <div style="font-size:0.78rem;font-weight:700;color:var(--info)">${booking.customer_name||t('customer')}</div>
            <div style="font-size:0.68rem;color:var(--text2)">${booking.start_time}~${booking.end_time}</div>
            <div style="font-size:0.68rem;color:var(--primary)">${formatMoney(booking.amount)}</div>
          </div>`;
        } else {
          html+=`<div style="padding:0.2rem;background:rgba(59,130,246,0.06);border-left:3px solid rgba(59,130,246,0.3);border-bottom:1px solid rgba(255,255,255,0.02)"></div>`;
        }
      } else {
        html+=`<div style="padding:0.2rem;border-bottom:1px solid rgba(255,255,255,${isHalf?'0.01':'0.03'});${isNow?'background:rgba(16,185,129,0.03)':''};cursor:pointer;min-height:28px" onclick="quickBook(${court.id},'${slot.time}','${nextTime}')" title="${t('addBooking')}">
          ${isNow?'<div style="font-size:0.6rem;color:var(--primary)">▸ now</div>':''}
        </div>`;
      }
    });
  });

  html+=`</div>`;

  const body=document.getElementById('timeline-body');
  if(body) body.innerHTML=html;

  // Auto scroll to current hour
  if(isToday){
    const gridEl=body?.parentElement;
    if(gridEl){
      const rowHeight=39;
      gridEl.scrollTop=Math.max(0,(currentHour-7)*rowHeight);
    }
  }
}

function quickBook(facId,start,end){
  openBookingModal();
  setTimeout(()=>{
    const sel=document.getElementById('nb-fac');
    if(sel){for(let i=0;i<sel.options.length;i++){if(sel.options[i].value==facId){sel.selectedIndex=i;break}}}
    const s=document.getElementById('nb-start');if(s){s.value=start;s.dispatchEvent(new Event('change'))}
    const e=document.getElementById('nb-end');if(e)e.value=end;
    // Trigger amount calc
    const evt=new Event('change');if(s)s.dispatchEvent(evt);
  },100);
}

async function loadCustBooking(){
  const today=todayUB();
  const selDate=document.getElementById('cb-date')?.value||today;
  const [facs,bookings]=await Promise.all([
    apiFetch('/api/facilities').then(r=>r.json()),
    apiFetch('/api/bookings?date='+selDate).then(r=>r.json())
  ]);
  const courts=facs.filter(f=>f.hourly_rate>0);

  document.getElementById('sec-cust-booking').innerHTML=`
    <div class="page-header"><h2>🎾 코트 예약</h2></div>
    <div style="margin-bottom:1rem">
      <input type="date" id="cb-date" value="${selDate}" min="${today}" style="max-width:180px" onchange="loadCustBooking()">
    </div>
    <div class="card" style="overflow-x:auto">
      <div style="display:grid;grid-template-columns:55px ${courts.map(()=>'1fr').join(' ')};gap:0;min-width:${55+courts.length*120}px;font-size:0.8rem">
        <div style="padding:0.4rem;font-weight:700;color:var(--text2)"></div>
        ${courts.map(f=>`<div style="padding:0.4rem;font-weight:700;text-align:center;color:var(--primary)">
          🎾 ${f.name}<br><span style="font-size:0.7rem;color:var(--text2)">${formatMoney(f.hourly_rate)}${t('perHour')}</span>
        </div>`).join('')}
        ${Array.from({length:18},(_, i)=>i+6).map(h=>{
          const time=String(h).padStart(2,'0')+':00';
          const endTime=String(h+1).padStart(2,'0')+':00';
          return `<div style="padding:0.35rem;color:var(--text2);font-size:0.78rem">${time}</div>`+
            courts.map(f=>{
              const booked=bookings.some(b=>b.facility_id===f.id&&b.status!=='cancelled'&&parseInt(b.start_time)<=h&&parseInt(b.end_time)>h);
              if(booked){
                const bk=bookings.find(b=>b.facility_id===f.id&&b.status!=='cancelled'&&parseInt(b.start_time)===h);
                return `<div style="padding:0.35rem;text-align:center;background:rgba(239,68,68,0.1);border-radius:6px;margin:1px">
                  <span style="color:var(--danger);font-size:0.75rem">예약됨</span>
                </div>`;
              }
              return `<div style="padding:0.35rem;text-align:center;cursor:pointer;border-radius:6px;margin:1px;background:rgba(16,185,129,0.06);transition:all .2s" 
                onclick="openCustBookModal(${f.id},'${f.name}',${f.hourly_rate},'${selDate}','${time}','${endTime}')"
                onmouseover="this.style.background='rgba(16,185,129,0.2)'" onmouseout="this.style.background='rgba(16,185,129,0.06)'">
                <span style="color:var(--success);font-size:0.75rem">○ 가능</span>
              </div>`;
            }).join('');
        }).join('')}
      </div>
    </div>
    <div style="font-size:0.8rem;color:var(--text2);margin-top:0.5rem">
      <span style="color:var(--success)">○ 가능</span> — 클릭하면 바로 예약! &nbsp;
      <span style="color:var(--danger)">예약됨</span> — 이미 예약된 시간
    </div>`;
}

function calcCustAmount(rate){
  const s=parseInt(g('cb-start')),e=parseInt(g('cb-end'));
  const hours=Math.max(e-s,0);
  document.getElementById('cb-total').textContent=formatMoney(rate*hours);
}

async function submitCustBooking(facId,date){
  const body={facility_id:facId,booking_date:date,start_time:g('cb-start'),end_time:g('cb-end'),payment_method:g('cb-pay')};
  const res=await apiFetch('/api/my-bookings',{method:'POST',body:JSON.stringify(body)});
  const d=await res.json();
  if(!res.ok)return alert('❌ '+d.error);
  closeModal();

  if(d.qpay){
    // QPay 결제 모달
    showQPayModal(d);
  } else {
    alert('🎉 '+d.message);
    loadCustBooking();
  }
}

function showQPayModal(d){
  const qrImg=d.qpay.qr_image?`<img src="data:image/png;base64,${d.qpay.qr_image}" style="width:200px;height:200px;border-radius:12px;margin:1rem auto;display:block">`
    :`<div style="background:white;color:#000;padding:1rem;border-radius:12px;word-break:break-all;font-size:0.7rem;margin:1rem 0">${d.qpay.qr_text||'QR 로딩 중...'}</div>`;
  
  const bankApps=d.qpay.urls||[];
  
  document.getElementById('modal-container').innerHTML=`<div class="modal-overlay"><div class="modal" style="text-align:center">
    <div style="font-size:2.5rem;margin-bottom:0.5rem">📱</div>
    <h3 style="margin:0 0 0.3rem">QPay 결제</h3>
    <p style="color:var(--text2);font-size:0.85rem;margin-bottom:0.5rem">${d.message}</p>
    <div style="font-size:1.8rem;font-weight:800;color:var(--primary);margin:0.5rem 0">${formatMoney(d.amount)}</div>
    ${qrImg}
    ${bankApps.length?`<div style="margin:1rem 0">
      <p style="font-size:0.8rem;color:var(--text2);margin-bottom:0.5rem">앱으로 결제:</p>
      <div style="display:flex;flex-wrap:wrap;gap:0.3rem;justify-content:center">
        ${bankApps.slice(0,8).map(u=>`<a href="${u.link}" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.4rem 0.8rem;border-radius:8px;background:var(--bg);color:var(--text);text-decoration:none;font-size:0.75rem">
          ${u.logo?`<img src="${u.logo}" style="width:20px;height:20px;border-radius:4px">`:''}${u.description||u.name||''}
        </a>`).join('')}
      </div>
    </div>`:''}
    <div id="qpay-status" style="padding:0.8rem;border-radius:10px;background:rgba(245,158,11,0.1);margin:1rem 0">
      <div style="color:var(--warning);font-weight:700">⏳ 결제 대기 중...</div>
      <div style="font-size:0.8rem;color:var(--text2)">결제 완료 시 자동으로 예약이 확정됩니다</div>
    </div>
    <button class="btn" style="background:var(--card2);width:100%;justify-content:center" onclick="closeModal();loadCustBooking()">닫기</button>
  </div></div>`;

  // 결제 완료 폴링 (5초마다 확인)
  let checkCount=0;
  const checkInterval=setInterval(async()=>{
    checkCount++;
    if(checkCount>60){clearInterval(checkInterval);return} // 5분 후 중단
    try{
      const r=await fetch(API+'/api/qpay/check/'+d.id).then(r=>r.json());
      if(r.paid){
        clearInterval(checkInterval);
        document.getElementById('qpay-status').innerHTML=`
          <div style="color:var(--success);font-weight:700;font-size:1.1rem">✅ 결제 완료!</div>
          <div style="font-size:0.9rem;color:var(--text)">예약이 자동 확정되었습니다</div>`;
        document.getElementById('qpay-status').style.background='rgba(34,197,94,0.1)';
      }
    }catch(e){}
  },5000);
}

          <button class="btn btn-sm btn-danger" onclick="cancelMyBooking(${b.id})"><i class="fas fa-times"></i> 예약 취소</button>
        </div>`:''}
        ${isToday?'<div style="margin-top:0.5rem;color:var(--primary);font-size:0.85rem;font-weight:700">📍 오늘 예약입니다!</div>':''}
      </div>`}).join(''):`
      <div class="card" style="text-align:center;padding:3rem;color:var(--text2)">
        <div style="font-size:3rem;margin-bottom:1rem">🎾</div>
        <p>아직 예약이 없습니다</p>
        <button class="btn btn-primary" style="margin-top:1rem" onclick="showSection('cust-booking')">코트 예약하기</button>
      </div>`}`;
}

async function cancelMyBooking(id){
  if(!confirm('예약을 취소하시겠습니까?'))return;
  const res=await apiFetch('/api/my-bookings/'+id,{method:'DELETE'});
  const d=await res.json();
  if(!res.ok)return alert('❌ '+d.error);
  alert('✅ '+d.message);loadCustMyBookings();
}

// ====== CUSTOMER CLASSES ======
async function loadCustClasses(){
  const classes=await fetch(API+'/api/public/classes').then(r=>r.json());
  document.getElementById('sec-cust-classes').innerHTML=`
    <div class="page-header"><h2>📚 수업 안내</h2></div>
    ${classes.map(c=>`<div class="card" style="border-left:4px solid var(--info)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.5rem">
        <div>
          <div style="font-weight:700;font-size:1.1rem">${c.name}</div>
          <div style="color:var(--text2);font-size:0.85rem;margin-top:0.3rem">👨‍🏫 ${c.instructor}</div>
        </div>
        <div style="text-align:right">
          <div style="color:var(--primary);font-weight:700;font-size:1.1rem">${formatMoney(c.monthly_fee)}<span style="font-size:0.8rem;font-weight:400">/월</span></div>
          <div style="font-size:0.85rem;color:var(--text2)">${c.current_students}/${c.max_students}명</div>
        </div>
      </div>
      <div style="margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid rgba(255,255,255,0.03)">
        <span style="color:var(--info)">📅 ${c.day_of_week}</span> &nbsp;
        <span style="color:var(--text2)">⏰ ${c.start_time} ~ ${c.end_time}</span>
      </div>
      ${c.description?`<div style="font-size:0.85rem;color:var(--text2);margin-top:0.3rem">${c.description}</div>`:''}
      ${c.current_students<c.max_students?`<div style="margin-top:0.5rem"><span class="badge badge-available">수강 가능</span></div>`:`<div style="margin-top:0.5rem"><span class="badge badge-occupied">마감</span></div>`}
    </div>`).join('')}`;
}

// ====== USERS ======
async function loadUsers(){
  if(currentUser.role!=='admin')return;
  const users=await apiFetch('/api/users').then(r=>r.json());
  const roleBadge=r=>r==='admin'?`<span class="badge" style="background:rgba(139,92,246,0.15);color:#8b5cf6">${t('roleAdmin')}</span>`:
    r==='staff'?`<span class="badge badge-available">${t('roleStaff')}</span>`:
    `<span class="badge" style="background:rgba(59,130,246,0.15);color:var(--info)">${t('roleCustomer')}</span>`;
  document.getElementById('sec-users').innerHTML=`
    <div class="page-header"><h2>👥 ${t('userMgmt')}</h2>
      <button class="btn btn-primary" onclick="openUserModal()"><i class="fas fa-plus"></i> ${t('addUser')}</button></div>
    <div class="card" style="overflow-x:auto"><table><thead><tr><th>ID</th><th>${t('username')}</th><th>이름</th><th>${t('role')}</th><th></th></tr></thead>
    <tbody>${users.map(u=>`<tr>
      <td>${u.id}</td><td><strong>${u.username}</strong></td><td>${u.name}</td><td>${roleBadge(u.role)}</td>
      <td><button class="btn btn-sm btn-info" onclick="openUserModal(${u.id},'${u.username.replace(/'/g,"\\'")}','${u.name.replace(/'/g,"\\'")}','${u.role}')"><i class="fas fa-edit"></i></button>
      ${u.id!==currentUser.id?`<button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i></button>`:''}</td>
    </tr>`).join('')}</tbody></table></div>
    <div class="card" style="background:rgba(59,130,246,0.05);border:1px solid rgba(59,130,246,0.2)">
      <h4 style="color:var(--info);margin:0 0 0.5rem">📋 권한 안내</h4>
      <div style="font-size:0.85rem;color:var(--text2)">
        <p>🟣 <strong>${t('roleAdmin')}</strong> — 모든 기능 사용 가능 (설정, 가격, 사용자 관리)</p>
        <p>🟢 <strong>${t('roleStaff')}</strong> — 예약, 체크리스트, 장비, 공지 관리 가능</p>
        <p>🔵 <strong>${t('roleCustomer')}</strong> — 코트 현황, 수업 정보 조회만 가능</p>
      </div>
    </div>`;
}

function openUserModal(id,username,name,role){
  document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3 style="margin:0 0 1rem">${id?'✏️ '+t('editUser'):'➕ '+t('addUser')}</h3>
    <div class="form-group"><label>${t('username')}</label><input id="us-id" value="${username||''}" ${id?'disabled':''}></div>
    ${id?'':`<div class="form-group"><label>${t('password')}</label><input id="us-pw" type="password"></div>`}
    <div class="form-group"><label>이름</label><input id="us-name" value="${name||''}"></div>
    <div class="form-group"><label>${t('role')}</label><select id="us-role">
      <option value="admin" ${role==='admin'?'selected':''}>🟣 ${t('roleAdmin')}</option>
      <option value="staff" ${role==='staff'?'selected':''}>🟢 ${t('roleStaff')}</option>
      <option value="customer" ${role==='customer'||!role?'selected':''}>🔵 ${t('roleCustomer')}</option>
    </select></div>
    ${id?`<div class="form-group"><label>비밀번호 변경 (선택)</label><input id="us-pw" type="password" placeholder="변경 시에만 입력"></div>`:''}
    <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1rem">
      <button class="btn" style="background:var(--card2)" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary" onclick="saveUser(${id||'null'})">${t('save')}</button>
    </div></div></div>`;
}

async function saveUser(id){
  const body={username:g('us-id'),name:g('us-name'),role:g('us-role')};
  const pw=g('us-pw');if(pw)body.password=pw;
  if(!id&&!pw)return alert(t('password'));
  const res=await apiFetch(id?'/api/users/'+id:'/api/users',{method:id?'PUT':'POST',body:JSON.stringify(body)});
  const d=await res.json();if(!res.ok)return alert(d.error);
  closeModal();alert('✅ '+d.message);loadUsers();
}

async function deleteUser(id){if(!confirm(t('delete')+'?'))return;
  const res=await apiFetch('/api/users/'+id,{method:'DELETE'});const d=await res.json();
  if(!res.ok)return alert(d.error);loadUsers();
}

if(authToken&&currentUser)initApp();else applyLang();
document.getElementById('login-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

history.replaceState({sec:'dashboard'},'','#dashboard');
window.addEventListener('popstate',e=>{if(e.state&&e.state.sec){showSection(e.state.sec,true);}else{history.pushState({sec:_curSec},'','#'+_curSec);}});
if(location.hash){const h=location.hash.slice(1);if(h)setTimeout(()=>showSection(h,true),100);}
</script>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});</script>
</body>
</html>
